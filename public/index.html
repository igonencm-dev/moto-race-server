    }

    buildTerrain(points) {
      const level = LEVELS[this.levelIndex];
      const terrainFriction = (level && level.friction !== undefined) ? level.friction : 0.9;
      // Bodies physiques. Skip si gap=true. Swap p1↔p2 si segment va vers la gauche
      // (sinon le rectangle se met du mauvais côté de la ligne)
      for (let i = 0; i < points.length - 1; i++) {
        const origP1 = points[i];
        if (origP1.gap) continue;
        let p1 = origP1;
        let p2 = points[i + 1];
        if (p2.x < p1.x) { const tmp = p1; p1 = p2; p2 = tmp; }
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        if (dx === 0 && dy === 0) continue;
        const len = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const cx = (p1.x + p2.x) / 2;
        const cy = (p1.y + p2.y) / 2 + 50 * Math.cos(angle);
        const cxOffset = -50 * Math.sin(angle);
        this.matter.add.rectangle(cx + cxOffset, cy, len, 100, {
          isStatic: true,
          angle,
          label: 'terrain',
          friction: terrainFriction,
          chamfer: { radius: 0 }
        });
      }

      // Découpe en chunks (séparés par gap)
      const chunks = [];
      let chunk = [];
      for (let i = 0; i < points.length; i++) {
        chunk.push(points[i]);
        if (points[i].gap && i < points.length - 1) {
          chunks.push(chunk);
          chunk = [];
        }
      }
      if (chunk.length) chunks.push(chunk);

      // Visuel : remplissage marron par chunk (utilise min/max x pour bornes du polygone,
      // ce qui permet d'avoir des U-turns / segments inversés)
      const g = this.terrainGfx;
      g.fillStyle(0x4a3a2a);
      for (const c of chunks) {
        if (c.length < 2) continue;
        let minX = c[0].x, maxX = c[0].x;
        for (const p of c) {
          if (p.x < minX) minX = p.x;
          if (p.x > maxX) maxX = p.x;
        }
        g.beginPath();
        g.moveTo(minX, 1500);
        g.lineTo(c[0].x, c[0].y);
        c.forEach(p => g.lineTo(p.x, p.y));
        g.lineTo(maxX, 1500);
        g.closePath();
        g.fillPath();
      }

      // Bande d'herbe (swap si dx < 0)
      g.fillStyle(0x55aa44);
      for (let i = 0; i < points.length - 1; i++) {
        const origP1 = points[i];
        if (origP1.gap) continue;
        let p1 = origP1;
        let p2 = points[i + 1];
        if (p2.x < p1.x) { const tmp = p1; p1 = p2; p2 = tmp; }
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        if (dx === 0 && dy === 0) continue;
        const len = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const cx = (p1.x + p2.x) / 2;
        const cy = (p1.y + p2.y) / 2;
        const halfL = len / 2;
        const halfH = 5;
        const cos = Math.cos(angle), sin = Math.sin(angle);
        const corners = [[-halfL, -halfH], [halfL, -halfH], [halfL, halfH], [-halfL, halfH]]
          .map(([x, y]) => [cx + x * cos - y * sin, cy + x * sin + y * cos]);
        g.beginPath();
        g.moveTo(corners[0][0], corners[0][1]);
        corners.forEach(c => g.lineTo(c[0], c[1]));
        g.closePath();
        g.fillPath();
      }

      // Petits brins d'herbe (skip gap)
      g.lineStyle(2, 0x77cc55);
      for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i];
        if (p1.gap) continue;
        const p2 = points[i + 1];
        const segments = Math.floor(Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2) / 18);
        for (let s = 0; s < segments; s++) {
          const t = s / segments;
          const x = p1.x + (p2.x - p1.x) * t;
          const y = p1.y + (p2.y - p1.y) * t;
          g.lineBetween(x, y, x + (Math.random() - 0.5) * 2, y - 4 - Math.random() * 3);
        }
      }
    }

    drawDecor(d) {
      const g = this.decorGfx;
      if (d.type === 'arrow') {
        const angle = ({
          'right': 0, 'down': Math.PI / 2, 'left': Math.PI, 'up': -Math.PI / 2,
          'down-right': Math.PI / 4, 'down-left': 3 * Math.PI / 4
        })[d.dir] || 0;
        const cos = Math.cos(angle), sin = Math.sin(angle);
        const len = d.size || 70;
        const h = len * 0.18;
        const transform = (vx, vy) => [d.x + vx * cos - vy * sin, d.y + vx * sin + vy * cos];
        // Corps de la flèche (rectangle)
        g.fillStyle(0x44dd44);
        const rectVerts = [[-len / 2, -h], [len * 0.25, -h], [len * 0.25, h], [-len / 2, h]];
        const r = rectVerts.map(([vx, vy]) => transform(vx, vy));
        g.beginPath();
        g.moveTo(r[0][0], r[0][1]);
        r.forEach(p => g.lineTo(p[0], p[1]));
        g.closePath();
        g.fillPath();
        // Pointe (triangle)
        const t1 = transform(len * 0.25, -h * 2.2);
        const t2 = transform(len * 0.25, h * 2.2);
        const t3 = transform(len / 2, 0);
        g.fillTriangle(t1[0], t1[1], t2[0], t2[1], t3[0], t3[1]);
        // Bord sombre
        g.lineStyle(2, 0x008822);
        const allVerts = [r[0], r[1], t1, t3, t2, r[2], r[3]];
        g.beginPath();
        g.moveTo(allVerts[0][0], allVerts[0][1]);
        allVerts.forEach(p => g.lineTo(p[0], p[1]));
        g.closePath();
        g.strokePath();
      } else if (d.type === 'wall') {
        // Mur décoratif (visuel uniquement)
        g.fillStyle(0x4a3a2a);
        g.fillRect(d.x - d.w / 2, d.y, d.w, d.h);
        // Détails rochers
        g.fillStyle(0x6a5a3a);
        for (let i = 0; i < d.h / 40; i++) {
          const xx = d.x - d.w / 4 + (i % 2) * (d.w / 2);
          g.fillCircle(xx, d.y + 20 + i * 35, 3);
        }
        // Bord vert (herbe sur le côté droit)
        g.fillStyle(0x55aa44);
        g.fillRect(d.x + d.w / 2 - 3, d.y, 3, d.h);
      } else if (d.type === 'rockCeiling') {
        // Gros rocher / plafond suspendu
        g.fillStyle(0x4a3a2a);
        g.fillRect(d.x - d.w / 2, d.y, d.w, d.h);
        // Bord déchiqueté en bas
        g.fillStyle(0x3a2a1a);
        const teeth = Math.max(4, Math.floor(d.w / 35));
        for (let i = 0; i < teeth; i++) {
          const tx = d.x - d.w / 2 + (i + 0.5) * (d.w / teeth);
          g.fillTriangle(
            tx - d.w / teeth / 2, d.y + d.h,
            tx + d.w / teeth / 2, d.y + d.h,
            tx, d.y + d.h + 12 + (i % 2) * 4
          );
        }
        // Détails (pierres + ombre)
        g.fillStyle(0x6a5a3a);
        for (let i = 0; i < d.w / 50; i++) {
          g.fillCircle(d.x - d.w / 2 + (i + 0.5) * 50, d.y + 15 + (i % 2) * 25, 3);
        }
      }
    }

    addBoostPad(bp) {
      this.matter.add.rectangle(bp.x, bp.y, bp.w, bp.h, {
        isStatic: true, isSensor: true, label: 'boostpad'
      });
      const g = this.boostPadGfx;
      // Fond orange vif
      g.fillStyle(0xff6622);
      g.fillRoundedRect(bp.x - bp.w / 2, bp.y - bp.h / 2, bp.w, bp.h, 4);
      g.lineStyle(2, 0xffaa44);
      g.strokeRoundedRect(bp.x - bp.w / 2, bp.y - bp.h / 2, bp.w, bp.h, 4);
      // Flèches blanches
      g.fillStyle(0xffffff);
      const arrowSpacing = 35;
      const numArrows = Math.max(1, Math.floor(bp.w / arrowSpacing));
      const startAx = bp.x - bp.w / 2 + (bp.w - (numArrows - 1) * arrowSpacing) / 2;
      for (let i = 0; i < numArrows; i++) {
        const ax = startAx + i * arrowSpacing;
        g.fillTriangle(
          ax - 7, bp.y - 6,
          ax + 7, bp.y,
          ax - 7, bp.y + 6
        );
      }
    }

    addHazard(h) {
      this.matter.add.rectangle(h.x, h.y, h.w, h.h, {
        isStatic: true, isSensor: true, label: 'hazard'
      });
      this.hazards.push(h);
    }

    drawHazards() {
      const g = this.hazardsGfx;
      g.clear();
      this.hazards.forEach(h => {
        // Lave principale
        g.fillStyle(0xcc2200);
        g.fillRect(h.x - h.w / 2, h.y - h.h / 2, h.w, h.h);
        // Surface plus chaude (orange)
        g.fillStyle(0xff5500);
        g.fillRect(h.x - h.w / 2, h.y - h.h / 2, h.w, Math.min(8, h.h * 0.25));
        // Bulles animées
        const t = this.hazardTime;
        for (let i = 0; i < Math.floor(h.w / 25); i++) {
          const phase = t + i * 0.7;
          const bx = h.x - h.w / 2 + (i + 0.5) * (h.w / Math.floor(h.w / 25));
          const bobY = h.y - h.h / 2 + 4 + (Math.sin(phase) * 2);
          g.fillStyle(0xffcc00);
          g.fillCircle(bx, bobY, 2 + (Math.sin(phase * 1.3) + 1));
        }
      });
    }

    addCoin(c) {
      const body = this.matter.add.circle(c.x, c.y, 14, {
        isStatic: true, isSensor: true, label: 'coin'
      });
      const coin = { x: c.x, y: c.y, body, collected: false, phase: Math.random() * Math.PI * 2 };
      body._coin = coin;
      this.coins.push(coin);
    }

    drawCoins(time) {
      const g = this.coinsGfx;
      g.clear();
      this.coins.forEach(c => {
        if (c.collected) return;
        // Animation rotation : la pièce tourne donc sa largeur varie
        const t = time / 100 + c.phase;
        const sw = Math.abs(Math.cos(t)) * 0.95 + 0.05;
        const w = 22 * sw;
        // Disque jaune
        g.fillStyle(0xffdd44);
        g.fillEllipse(c.x, c.y, w, 22);
        // Bordure dorée
        g.lineStyle(2, 0xff9900);
        g.strokeEllipse(c.x, c.y, w, 22);
        // Reflet brillant
        g.fillStyle(0xffffaa, 0.7);
        g.fillEllipse(c.x - w * 0.15, c.y - 4, w * 0.4, 6);
      });
    }

    buildCeilingPath(points) {
      const g = this.ceilingsGfx;

      // === Découpe en chunks (séparés par les points marqués gap) ===
      const chunks = [];
      let chunk = [];
      for (let i = 0; i < points.length; i++) {
        chunk.push(points[i]);
        if (points[i].gap && i < points.length - 1) {
          chunks.push(chunk);
          chunk = [];
        }
      }
      if (chunk.length) chunks.push(chunk);

      // === Physique : un rectangle par segment (skip les segments gap), étendu VERS LE HAUT ===
      for (let i = 0; i < points.length - 1; i++) {
        if (points[i].gap) continue;
        let p1 = points[i];
        let p2 = points[i + 1];
        if (p2.x < p1.x) { const tmp = p1; p1 = p2; p2 = tmp; }
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        if (dx === 0 && dy === 0) continue;
        const len = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const cx = (p1.x + p2.x) / 2;
        const cxOffset = 50 * Math.sin(angle);
        const cy = (p1.y + p2.y) / 2 - 50 * Math.cos(angle);
        this.matter.add.rectangle(cx + cxOffset, cy, len, 100, {
          isStatic: true,
          angle,
          label: 'ceiling',
          chamfer: { radius: 0 }
        });
      }

      // === Visuel : un polygone de roche par chunk ===
      g.fillStyle(0x4a3a2a);
      for (const c of chunks) {
        if (c.length < 2) continue;
        g.beginPath();
        g.moveTo(c[0].x, -1800);
        for (const p of c) g.lineTo(p.x, p.y);
        g.lineTo(c[c.length - 1].x, -1800);
        g.closePath();
        g.fillPath();
      }

      // Texture rochers (taches plus claires) au-dessus du contour
      g.fillStyle(0x6a5a3a);
      for (let i = 0; i < points.length - 1; i++) {
        if (points[i].gap) continue;
        const p1 = points[i];
        const p2 = points[i + 1];
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = -dy / len, ny = -dx / len; // inversé pour éviter conflit, on calcule directement
        const segments = Math.max(1, Math.floor(len / 50));
        for (let s = 0; s < segments; s++) {
          const t = (s + 0.5) / segments;
          const baseX = p1.x + dx * t;
          const baseY = p1.y + dy * t;
          // Tache à ~25-50px au-dessus du contour
          const offset = 25 + Math.random() * 30;
          const upX = baseX + (-dy / len) * (-offset); // inverse car on veut aller VERS LE HAUT
          const upY = baseY - Math.abs(dx / len) * offset - offset * 0.5;
          g.fillCircle(upX, upY, 2 + Math.random() * 2);
        }
      }

      // === Bande d'herbe verte sur le bord inférieur (le bord exposé, qui touche la grotte) ===
      g.fillStyle(0x55aa44);
      for (let i = 0; i < points.length - 1; i++) {
        if (points[i].gap) continue;
        let p1 = points[i];
        let p2 = points[i + 1];
        if (p2.x < p1.x) { const tmp = p1; p1 = p2; p2 = tmp; }
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len === 0) continue;
        const angle = Math.atan2(dy, dx);
        const cx = (p1.x + p2.x) / 2;
        const cy = (p1.y + p2.y) / 2;
        // Bande mince juste au-dessus du contour (côté roche)
        const halfL = len / 2;
        const halfH = 4;
        const cos = Math.cos(angle), sin = Math.sin(angle);
        // Décale la bande de 4px VERS LE HAUT (côté roche)
        const offsetCx = cx + 4 * Math.sin(angle);
        const offsetCy = cy - 4 * Math.cos(angle);
        const corners = [[-halfL, -halfH], [halfL, -halfH], [halfL, halfH], [-halfL, halfH]]
          .map(([x, y]) => [offsetCx + x * cos - y * sin, offsetCy + x * sin + y * cos]);
        g.beginPath();
        g.moveTo(corners[0][0], corners[0][1]);
        corners.forEach(c => g.lineTo(c[0], c[1]));
        g.closePath();
        g.fillPath();
      }

      // === Dents d'herbe pointant vers la grotte (vers le bas, vers le bike) ===
      g.fillStyle(0x77cc55);
      for (let i = 0; i < points.length - 1; i++) {
        if (points[i].gap) continue;
        const p1 = points[i];
        const p2 = points[i + 1];
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len === 0) continue;
        // Normale pointant vers la grotte (côté bike, côté "bas" du plafond)
        // Pour ceiling : pointe vers le bas-gauche-bas selon l'angle
        // (-dy, dx)/len pointe vers... pour dx>0, dy=0: (0, dx/len) = (0, +1) = down. ✓
        const nx = -dy / len;
        const ny = dx / len;
        const teeth = Math.max(2, Math.floor(len / 16));
        for (let s = 0; s < teeth; s++) {
          const t = (s + 0.5) / teeth;
          const baseX = p1.x + dx * t;
          const baseY = p1.y + dy * t;
          const halfBaseW = 3 + Math.random();
          // Base le long du segment
          const tangX = dx / len * halfBaseW;
          const tangY = dy / len * halfBaseW;
          const tipDepth = 5 + Math.random() * 4;
          // Pointe dans la direction normale (vers la grotte = vers le bas)
          const tipX = baseX + nx * tipDepth;
          const tipY = baseY + ny * tipDepth;
          g.fillTriangle(
            baseX - tangX, baseY - tangY,
            baseX + tangX, baseY + tangY,
            tipX, tipY
          );
        }
      }
    }

    addCeiling(c) {
      this.matter.add.rectangle(c.x, c.y, c.w, c.h, {
        isStatic: true,
        label: 'ceiling'
      });
      const g = this.ceilingsGfx;
      // Roche sombre
      g.fillStyle(0x3a2f24);
      g.fillRect(c.x - c.w / 2, c.y - c.h / 2, c.w, c.h);
      // Bord plus clair en bas (effet stalactites)
      g.fillStyle(0x2a1f15);
      g.fillRect(c.x - c.w / 2, c.y + c.h / 2 - 4, c.w, 4);
      // Texture rochers
      for (let i = 0; i < Math.floor(c.w / 30); i++) {
        const dotX = c.x - c.w / 2 + (i + 0.5) * (c.w / Math.floor(c.w / 30));
        const dotY = c.y - c.h / 2 + 4 + (i % 2) * 6;
        g.fillStyle(0x4a3f34);
        g.fillCircle(dotX, dotY, 2);
      }
    }

    addObstacle(o) {
      this.matter.add.rectangle(o.x, o.y, o.w, o.h, {
        isStatic: true,
        label: 'obstacle'
      });
      const g = this.obstaclesGfx;
      g.fillStyle(0xaa3333);
      g.fillRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h);
      g.lineStyle(2, 0x661111);
      g.strokeRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h);
      // bandes jaunes danger
      g.fillStyle(0xffdd00);
      g.fillRect(o.x - o.w / 2 + 4, o.y - 4, o.w - 8, 3);
    }

    addFinishLine(level) {
      const lastP = level.terrain[level.terrain.length - 1];
      const groundY = lastP.y;
      // sensor invisible, plein écran vertical
      this.matter.add.rectangle(this.finishX, groundY - 250, 12, 500, {
        isStatic: true,
        isSensor: true,
        label: 'finish'
      });

      // visuel : poteau + drapeau à damier
      const g = this.add.graphics();
      // poteau
      g.fillStyle(0xeeeeee);
      g.fillRect(this.finishX - 3, groundY - 500, 6, 500);
      g.lineStyle(2, 0x222222);
      g.strokeRect(this.finishX - 3, groundY - 500, 6, 500);
      // drapeau damier
      const flagW = 60, flagH = 50;
      const flagY = groundY - 490;
      const cellW = flagW / 6, cellH = flagH / 5;
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 6; c++) {
          g.fillStyle((r + c) % 2 === 0 ? 0xffffff : 0x111111);
          g.fillRect(this.finishX + c * cellW, flagY + r * cellH, cellW, cellH);
        }
      }
      // Texte FINISH
      this.add.text(this.finishX, groundY - 540, 'ARRIVÉE', {
        font: 'bold 20px sans-serif',
        color: '#ffdd44',
        stroke: '#000', strokeThickness: 4
      }).setOrigin(0.5);
    }

    createBike(x, y) {
      const group = this.matter.world.nextGroup(true); // groupe négatif : pas de collision interne

      // Moto plus grosse : chassis 90x18, roues r=17, offset 32x21
      const chassis = this.matter.add.rectangle(x, y, 90, 18, {
        density: 0.002,         // un peu plus léger → plus maniable
        friction: 0.3,
        label: 'chassis',
        collisionFilter: { group }
      });

      const wheelBack = this.matter.add.circle(x - 32, y + 21, 17, {
        density: 0.005,
        friction: 1.0,
        frictionStatic: 1.2,
        label: 'wheel',
        collisionFilter: { group }
      });

      const wheelFront = this.matter.add.circle(x + 32, y + 21, 17, {
        density: 0.005,
        friction: 1.0,
        frictionStatic: 1.2,
        label: 'wheel',
        collisionFilter: { group }
      });

      this.matter.add.constraint(chassis, wheelBack, 0, 0.8, {
        pointA: { x: -32, y: 21 }, length: 0
      });
      this.matter.add.constraint(chassis, wheelFront, 0, 0.8, {
        pointA: { x: 32, y: 21 }, length: 0
      });

      this.lastAngle = chassis.angle;

      return { chassis, wheelBack, wheelFront };
    }

    onCollisionStart(event) {
      event.pairs.forEach(pair => {
        const labels = [pair.bodyA.label, pair.bodyB.label].sort();
        const labelStr = labels.join('-');

        if (labelStr === 'terrain-wheel' || labelStr === 'obstacle-wheel') {
          this.contactCount++;
        }
        if (this.crashed || this.finished) return;

        // Crash uniquement si la moto est franchement retournée (>110°)
        if (labelStr === 'chassis-terrain' || labelStr === 'chassis-obstacle') {
          let a = this.bike.chassis.angle;
          while (a > Math.PI) a -= 2 * Math.PI;
          while (a < -Math.PI) a += 2 * Math.PI;
          if (Math.abs(a) > 1.9) {
            this.crash();
          } else {
            // juste un rebond, pas de crash
            const v = this.bike.chassis.velocity;
            Matter.Body.setVelocity(this.bike.chassis, { x: v.x * 0.7, y: v.y - 2 });
            this.cameras.main.shake(80, 0.006);
          }
        }
        // Roue qui touche une mine = freinage, pas crash
        if (labelStr === 'obstacle-wheel') {
          const v = this.bike.chassis.velocity;
          Matter.Body.setVelocity(this.bike.chassis, { x: v.x * 0.4, y: v.y - 4 });
          this.cameras.main.shake(120, 0.008);
          if (window.audio) window.audio.playBump();
        }
        // Plafond touché : CRASH (le plafond tue)
        if (labelStr === 'ceiling-wheel' || labelStr === 'ceiling-chassis') {
          if (!this.crashed && !this.finished) this.crash();
        }

        // BOOST PAD : applique une grosse impulsion forward
        if (labelStr === 'boostpad-wheel' || labelStr === 'boostpad-chassis') {
          const a = this.bike.chassis.angle;
          const v = this.bike.chassis.velocity;
          // Boost vers l'avant + petit lift
          Matter.Body.setVelocity(this.bike.chassis, {
            x: Math.max(v.x + 7, 9),
            y: v.y - 3
          });
          this.cameras.main.flash(80, 255, 200, 100);
          if (window.audio) window.audio.playFlip();
        }

        // COIN : collecte → -0.5s + son
        if (labelStr === 'coin-wheel' || labelStr === 'coin-chassis') {
          const coinBody = (pair.bodyA.label === 'coin') ? pair.bodyA : pair.bodyB;
          if (coinBody._coin && !coinBody._coin.collected) {
            coinBody._coin.collected = true;
            this.flipBonus += 0.5;
            this.showFloatingText('💰  +0.5s', '#ffdd44');
            if (window.audio) window.audio.playFlip();
            try { this.matter.world.remove(coinBody); } catch (e) {}
          }
        }

        // HAZARD (lave) : crash instantané
        if (labelStr === 'hazard-wheel' || labelStr === 'hazard-chassis') {
          if (!this.crashed && !this.finished) this.crash();
        }

        // arrivée
        if (labelStr === 'finish-wheel' || labelStr === 'chassis-finish') {
          this.finish();
        }
      });
    }

    onCollisionEnd(event) {
      event.pairs.forEach(pair => {
        const labels = [pair.bodyA.label, pair.bodyB.label].sort();
        const labelStr = labels.join('-');
        if (labelStr === 'terrain-wheel' || labelStr === 'obstacle-wheel') {
          this.contactCount = Math.max(0, this.contactCount - 1);
        }
      });
    }

    update(time, delta) {
      // === Countdown (refactor : startTime garanti après 3s même si frame skip) ===
      const ctElapsed = (time - this.countdownStart) / 1000;

      if (this.startTime === null && ctElapsed >= 3) {
        this.startTime = this.countdownStart + 3000;
        this.lastAngle = this.bike.chassis.angle;
        // Premier run : démarre le compte à rebours challenge
        if (this.challengeMode && this.challengeEndTime === null) {
          this.challengeEndTime = this.startTime + this.CHALLENGE_DURATION * 1000;
        }
      }

      if (ctElapsed < 3) {
        const num = ctElapsed < 1 ? '3' : (ctElapsed < 2 ? '2' : '1');
        this.countdownText.setText(num).setVisible(true);

        // figer la moto pendant le countdown
        Matter.Body.setVelocity(this.bike.chassis, { x: 0, y: 0 });
        Matter.Body.setVelocity(this.bike.wheelBack, { x: 0, y: 0 });
        Matter.Body.setVelocity(this.bike.wheelFront, { x: 0, y: 0 });
        Matter.Body.setAngularVelocity(this.bike.chassis, 0);
        Matter.Body.setAngularVelocity(this.bike.wheelBack, 0);
        Matter.Body.setAngularVelocity(this.bike.wheelFront, 0);

        this.followTarget.x = this.bike.chassis.position.x;
        this.followTarget.y = this.bike.chassis.position.y;
        this.drawBike(this.bike, this.bikeGfx, 0xff5533);
        if (this.ghostState && this.ghostGfx) this.drawGhost();
        return;
      } else if (ctElapsed < 3.7) {
        this.countdownText.setText('GO !').setColor('#44ff44').setVisible(true);
      } else {
        this.countdownText.setVisible(false);
      }

      // === Boost actif : pulse de force pendant 0.6s ===
      if (this.boostActive) {
        if (time >= this.boostEndsAt) {
          this.boostActive = false;
        } else if (!this.crashed && !this.finished) {
          const a = this.bike.chassis.angle;
          Matter.Body.applyForce(this.bike.chassis, this.bike.chassis.position, {
            x: Math.cos(a) * 0.0035,
            y: Math.sin(a) * 0.0035
          });
        }
      }

      // === Inputs (flèches + ZQSD/WASD) ===
      if (!this.crashed && !this.finished) {
        const accel = this.cursors.right.isDown || this.keyD.isDown;
        const brake = this.cursors.left.isDown || this.keyA.isDown || this.keyQ.isDown;
        const tiltUp = this.cursors.up.isDown || this.keyW.isDown || this.keyZ.isDown;
        const tiltDown = this.cursors.down.isDown || this.keyS.isDown;

        if (accel) {
          // roues qui tournent vite
          Matter.Body.setAngularVelocity(this.bike.wheelBack,
            Math.min(this.bike.wheelBack.angularVelocity + 0.10, 1.2));
          Matter.Body.setAngularVelocity(this.bike.wheelFront,
            Math.min(this.bike.wheelFront.angularVelocity + 0.05, 1.2));
          // poussée horizontale (plus forte)
          const a = this.bike.chassis.angle;
          Matter.Body.applyForce(this.bike.chassis, this.bike.chassis.position, {
            x: Math.cos(a) * 0.0024,
            y: Math.sin(a) * 0.0024
          });
        }
        if (brake) {
          Matter.Body.setAngularVelocity(this.bike.wheelBack,
            Math.max(this.bike.wheelBack.angularVelocity - 0.09, -0.6));
          Matter.Body.setAngularVelocity(this.bike.wheelFront,
            Math.max(this.bike.wheelFront.angularVelocity - 0.09, -0.6));
          const a = this.bike.chassis.angle;
          Matter.Body.applyForce(this.bike.chassis, this.bike.chassis.position, {
            x: -Math.cos(a) * 0.0012,
            y: -Math.sin(a) * 0.0012
          });
        }
        if (tiltUp) {
          // Wheelie : couple plus fort + lift visible
          const onGround = this.contactCount > 0;
          const boost = (accel && onGround) ? 0.038 : 0.022;
          Matter.Body.setAngularVelocity(this.bike.chassis,
            Math.max(this.bike.chassis.angularVelocity - boost, -0.8));
          if (accel && onGround) {
            Matter.Body.applyForce(this.bike.chassis, this.bike.chassis.position, {
              x: 0, y: -0.0010
            });
          }
        }
        if (tiltDown) {
          Matter.Body.setAngularVelocity(this.bike.chassis,
            Math.min(this.bike.chassis.angularVelocity + 0.022, 0.8));
        }
      }

      // === Tracking flips ===
      const angle = this.bike.chassis.angle;
      let deltaA = angle - this.lastAngle;
      while (deltaA > Math.PI) deltaA -= 2 * Math.PI;
      while (deltaA < -Math.PI) deltaA += 2 * Math.PI;
      const inAir = this.contactCount === 0;
      if (inAir) {
        this.cumulativeRotation += deltaA;
      } else {
        if (Math.abs(this.cumulativeRotation) > Math.PI * 1.7) {
          const fullFlips = Math.max(1, Math.floor(Math.abs(this.cumulativeRotation) / (Math.PI * 2)));
          if (this.cumulativeRotation < 0) {
            const bonus = 2 * fullFlips;
            this.flipBonus += bonus;
            this.showFloatingText('BACKFLIP !  -' + bonus + 's', '#ffdd44');
            if (window.audio) window.audio.playFlip();
          } else {
            const bonus = 1 * fullFlips;
            this.flipBonus += bonus;
            this.showFloatingText('FRONTFLIP !  -' + bonus + 's', '#44ddff');
            if (window.audio) window.audio.playFlip();
          }
        }
        this.cumulativeRotation = 0;
      }
      this.lastAngle = angle;

      // === Caméra ===
      const vx = this.bike.chassis.velocity.x;
      const lookAhead = Math.max(-50, Math.min(150, vx * 18));
      this.followTarget.x = this.bike.chassis.position.x + lookAhead;
      this.followTarget.y = this.bike.chassis.position.y - 60;

      // === Timer === (peut aller en négatif grâce aux flips bonus)
      if (!this.finished && !this.crashed && this.startTime !== null) {
        this.elapsed = (time - this.startTime) / 1000 - this.flipBonus;
      }
      this.timerText.setText(this.elapsed.toFixed(2));
      // Timer en vert quand négatif (record incroyable grâce aux flips)
      this.timerText.setColor(this.elapsed < 0 ? '#44ff66' : '#ffffff');
      if (this.flipBonus > 0) {
        this.bonusText.setText('-' + this.flipBonus.toFixed(0) + 's bonus');
      }
      // Vitesse en km/h (approx, basée sur la vélocité horizontale)
      const speedKmh = Math.abs(this.bike.chassis.velocity.x) * 36;
      this.speedText.setText('🏍  ' + Math.floor(speedKmh) + ' km/h');

      // Module le bruit moteur avec la vitesse
      if (window.audio && !this.crashed) {
        window.audio.setEngineSpeed(Math.min(1, speedKmh / 200));
      }

      // === Server transition countdown ===
      if (this.serverEndOverlay && this.serverNextMapAt && this.serverCountdownText) {
        const remaining = Math.max(0, (this.serverNextMapAt - Date.now()) / 1000);
        this.serverCountdownText.setText(`dans ${remaining.toFixed(1)}s`);
      }

      // === Challenge timer ===
      if (this.challengeMode && this.challengeEndTime !== null && !this.challengeEnded) {
        // En mode serveur : utilise Date.now() (horloge mur, sync entre joueurs via NTP)
        // En mode solo/multi P2P : utilise le temps Phaser local
        let remaining;
        if (this.mode === 'server' && this.serverState) {
          remaining = (this.serverState.mapStartedAt + this.serverState.mapDuration - Date.now()) / 1000;
        } else {
          remaining = (this.challengeEndTime - time) / 1000;
        }
        if (remaining <= 0) {
          this.challengeEnded = true;
          this.endChallenge();
        } else {
          if (remaining > 60) {
            const min = Math.floor(remaining / 60);
            const sec = Math.floor(remaining % 60);
            this.challengeTimerText.setText(`${min}:${sec.toString().padStart(2, '0')}`);
            this.challengeTimerText.setColor('#ffdd44');
          } else {
            this.challengeTimerText.setText(remaining.toFixed(1) + 's');
            this.challengeTimerText.setColor(remaining < 10 ? '#ff4444' : '#ff8844');
          }
        }
      }

      // === Sync multi P2P ===
      if (this.conn && this.conn.open) {
        if (!this._lastSent || time - this._lastSent > 33) {
          try {
            this.conn.send({
              type: 'pos',
              x: this.bike.chassis.position.x,
              y: this.bike.chassis.position.y,
              a: this.bike.chassis.angle,
              wba: this.bike.wheelBack.angle,
              wfa: this.bike.wheelFront.angle,
              crashed: this.crashed,
              finished: this.finished,
              pseudo: Player.getName(),
              sessionBest: this.sessionBestTime
            });
          } catch (e) {}
          this._lastSent = time;
        }
      }

      // === REPLAY : enregistrement des frames (multi P2P + salon privé) ===
      const isMultiCtx = this.conn || this.mode === 'private-server';
      if (isMultiCtx && this.startTime !== null && !this.finished && !this.crashed) {
        if (time - this.lastRecordTime >= this.RECORD_INTERVAL_MS) {
          this.recordingFrames.push({
            t: time - this.startTime,
            x: this.bike.chassis.position.x,
            y: this.bike.chassis.position.y,
            a: this.bike.chassis.angle,
            wba: this.bike.wheelBack.angle,
            wfa: this.bike.wheelFront.angle
          });
          this.lastRecordTime = time;
        }
      }

      // === Sync mode serveur (public ou privé) ===
      if ((this.mode === 'server' || this.mode === 'private-server') && ServerConn.connected) {
        if (!this._lastSent || time - this._lastSent > 33) {
          ServerConn.send({
            type: 'pos',
            x: this.bike.chassis.position.x,
            y: this.bike.chassis.position.y,
            a: this.bike.chassis.angle,
            wba: this.bike.wheelBack.angle,
            wfa: this.bike.wheelFront.angle,
            crashed: this.crashed,
            finished: this.finished,
            sessionBest: this.sessionBestTime
          });
          this._lastSent = time;
        }
      }

      // === Rendus ===
      this.drawBike(this.bike, this.bikeGfx, 0xff5533);
      if (this.ghostState && this.ghostGfx) this.drawGhost();
      if (this.ghosts && this.ghostsGfx) this.drawAllGhosts();

      // Animer coins (rotation visuelle)
      if (this.coins && this.coins.length) this.drawCoins(time);
      // Animer lave (bulles)
      if (this.hazards && this.hazards.length) {
        this.hazardTime = time / 200;
        this.drawHazards();
      }

      // chute en dehors de la carte
      if (this.bike.chassis.position.y > 1500 && !this.crashed && !this.finished) {
        this.crash();
      }

      // Floating texts
      this.flipMessages = this.flipMessages.filter(msg => {
        msg.life -= delta / 1000;
        if (msg.life <= 0) {
          msg.text.destroy();
          return false;
        }
        msg.text.y -= 50 * delta / 1000;
        msg.text.setAlpha(Math.min(1, msg.life * 1.4));
        return true;
      });
    }

    tryBoost() {
      if (this.boostUsed || this.crashed || this.finished || this.startTime === null) return;
      this.boostUsed = true;
      this.boostActive = true;
      this.boostEndsAt = this.time.now + 600; // 0.6s de pulse
      // Petit kick instantané pour la sensation
      const a = this.bike.chassis.angle;
      const v = this.bike.chassis.velocity;
      Matter.Body.setVelocity(this.bike.chassis, {
        x: v.x + Math.cos(a) * 3,
        y: v.y + Math.sin(a) * 3
      });
      // Feedback visuel + sonore
      this.cameras.main.flash(120, 200, 220, 255);
      this.showFloatingText('🚀 BOOST !', '#66ddff');
      if (window.audio) window.audio.playFlip();
      // Update HUD
      if (this.boostText) {
        this.boostText.setText('🚀  boost utilisé');
        this.boostText.setColor('#666');
      }
    }

    showFloatingText(content, color) {
      const t = this.add.text(this.scale.width / 2, this.scale.height / 2 - 30, content, {
        font: 'bold 36px sans-serif',
        color,
        stroke: '#000', strokeThickness: 5
      }).setOrigin(0.5).setScrollFactor(0);
      this.flipMessages.push({ text: t, life: 1.5 });
    }

    updateGlobalBestUI() {
      if (!this.globalBestText) return;
      if (this.cachedTop && this.cachedTop.length > 0) {
        const w = this.cachedTop[0];
        this.globalBestText.setText(`👑 ${w.pseudo} — ${parseFloat(w.time).toFixed(2)}s`);
      } else if (Leaderboard.isConfigured()) {
        this.globalBestText.setText('👑 sois le 1er à finir !');
      }
    }

    updateOpponentBestUI() {
      if (!this.opponentBestText) return;
      const name = this.peerPseudo || '?';
      if (this.peerSessionBest !== null) {
        this.opponentBestText.setText(`👤 ${name} : ${this.peerSessionBest.toFixed(2)}s`);
      } else {
        this.opponentBestText.setText(`👤 ${name} : —`);
      }
    }

    endChallenge() {
      if (window.audio) window.audio.stopEngine();

      // Mode serveur : ne lance pas ChallengeEnd, on attend les events du serveur
      if (this.mode === 'server') {
        return;
      }

      // Envoie une dernière mise à jour du best au peer
      if (this.conn && this.conn.open) {
        try {
          this.conn.send({
            type: 'pos',
            x: this.bike.chassis.position.x,
            y: this.bike.chassis.position.y,
            a: this.bike.chassis.angle,
            wba: this.bike.wheelBack.angle,
            wfa: this.bike.wheelFront.angle,
            crashed: this.crashed,
            finished: this.finished,
            pseudo: Player.getName(),
            sessionBest: this.sessionBestTime
          });
        } catch (e) {}

        // Envoie le replay de la meilleure run de cette map
        if (this.bestRunReplay) {
          try {
            this.conn.send({
              type: 'replay',
              replay: this.bestRunReplay
            });
          } catch (e) {}
        }
      }

      // Enregistre le résultat de cette map dans la séquence
      const newResults = [...this.results, {
        mapIndex: this.levelIndex,
        mySessionBest: this.sessionBestTime,
        peerSessionBest: this.peerSessionBest,
        runCount: this.runCount,
        myReplay: this.bestRunReplay,
        peerReplay: this.peerBestReplay
      }];

      const isLastMap = this.currentMapIdx >= this.mapSequence.length - 1;

      this.scene.pause();
      this.scene.launch('ChallengeEnd', {
        level: this.levelIndex,
        sessionBest: this.sessionBestTime,
        runCount: this.runCount,
        cachedTop: this.cachedTop,
        multiMode: this.mode !== 'solo',
        myPseudo: Player.getName() || '?',
        peerPseudo: this.peerPseudo,
        peerSessionBest: this.peerSessionBest,
        myReplay: this.bestRunReplay,
        peerReplay: this.peerBestReplay,
        peer: this.peer,
        conn: this.conn,
        // Séquence
        mapSequence: this.mapSequence,
        durationPerMap: this.durationPerMap,
        currentMapIdx: this.currentMapIdx,
        results: newResults,
        isLastMap,
        gameMode: this.mode
      });
    }

    handlePeerData(data) {
      if (!data) return;
      if (data.type === 'pos' && this.ghostState) {
        this.ghostState.x = data.x;
        this.ghostState.y = data.y;
        this.ghostState.a = data.a;
        this.ghostState.wba = data.wba;
        this.ghostState.wfa = data.wfa;
        this.ghostState.crashed = data.crashed;
        this.ghostState.finished = data.finished;
        // Récup pseudo + best en piggyback
        if (data.pseudo && data.pseudo !== this.peerPseudo) {
          this.peerPseudo = data.pseudo;
          this.updateOpponentBestUI();
        }
        if (data.sessionBest !== undefined &&
            data.sessionBest !== null &&
            (this.peerSessionBest === null || data.sessionBest < this.peerSessionBest)) {
          this.peerSessionBest = data.sessionBest;
          this.updateOpponentBestUI();
        }
      } else if (data.type === 'finished') {
        this.opponentFinishTime = data.time;
      } else if (data.type === 'replay') {
        // Le peer envoie son meilleur replay de la map
        if (data.replay && data.replay.frames && data.replay.frames.length > 0) {
          this.peerBestReplay = data.replay;
        }
      }
    }

    drawBike(bike, gfx, color) {
      gfx.clear();

      const c = bike.chassis;
      const cos = Math.cos(c.angle), sin = Math.sin(c.angle);

      // local(lx, ly) → world. Y NÉGATIF = au-dessus de la moto (Phaser : Y vers le bas).
      const local = (lx, ly) => ({
        x: c.position.x + lx * cos - ly * sin,
        y: c.position.y + lx * sin + ly * cos
      });

      // Suspensions (fourches) du chassis vers les roues
      gfx.lineStyle(5, 0x1a1a1a);
      const susBack = local(-32, 5);
      const susFront = local(32, 5);
      gfx.lineBetween(susBack.x, susBack.y, bike.wheelBack.position.x, bike.wheelBack.position.y);
      gfx.lineBetween(susFront.x, susFront.y, bike.wheelFront.position.x, bike.wheelFront.position.y);

      // Roues r=17
      const drawWheel = (wheel) => {
        const cx = wheel.position.x, cy = wheel.position.y;
        gfx.fillStyle(0x0a0a0a);
        gfx.fillCircle(cx, cy, 18);
        gfx.lineStyle(2, 0x000000);
        gfx.strokeCircle(cx, cy, 18);
        gfx.fillStyle(0x999999);
        gfx.fillCircle(cx, cy, 11);
        gfx.lineStyle(1.5, 0x555555);
        gfx.strokeCircle(cx, cy, 11);
        gfx.lineStyle(2, 0xdddddd);
        for (let i = 0; i < 6; i++) {
          const a = wheel.angle + i * Math.PI / 3;
          gfx.lineBetween(cx, cy, cx + Math.cos(a) * 10, cy + Math.sin(a) * 10);
        }
        gfx.fillStyle(0x444444);
        gfx.fillCircle(cx, cy, 4);
      };
      drawWheel(bike.wheelBack);
      drawWheel(bike.wheelFront);

      // Châssis (cadre)
      gfx.fillStyle(color);
      gfx.lineStyle(2, 0x111111);
      const frame = [
        local(-40, 6), local(40, 6), local(38, -5), local(-38, -5)
      ];
      gfx.beginPath();
      gfx.moveTo(frame[0].x, frame[0].y);
      frame.forEach(p => gfx.lineTo(p.x, p.y));
      gfx.closePath();
      gfx.fillPath();
      gfx.strokePath();

      // Réservoir (couleur plus sombre au-dessus du chassis, Y négatif)
      const tankColor = Phaser.Display.Color.ValueToColor(color).clone().darken(20).color;
      gfx.fillStyle(tankColor);
      const tank = [
        local(-16, -5), local(20, -5), local(12, -22), local(-12, -22)
      ];
      gfx.beginPath();
      gfx.moveTo(tank[0].x, tank[0].y);
      tank.forEach(p => gfx.lineTo(p.x, p.y));
      gfx.closePath();
      gfx.fillPath();
      gfx.lineStyle(1.5, 0x111111);
      gfx.strokePath();

      // Selle (zone noire derrière le tank)
      gfx.fillStyle(0x111111);
      const seat = [
        local(-42, -5), local(-14, -5), local(-12, -16), local(-40, -16)
      ];
      gfx.beginPath();
      gfx.moveTo(seat[0].x, seat[0].y);
      seat.forEach(p => gfx.lineTo(p.x, p.y));
      gfx.closePath();
      gfx.fillPath();

      // Phare avant (devant le chassis, légèrement au-dessus)
      const head = local(40, -6);
      gfx.fillStyle(0xffeebb);
      gfx.fillCircle(head.x, head.y, 6);
      gfx.lineStyle(1.5, 0x111111);
      gfx.strokeCircle(head.x, head.y, 6);
      // halo de lumière (en avant du phare)
      const halo = local(52, -6);
      gfx.fillStyle(0xffffaa, 0.25);
      gfx.fillCircle(halo.x, halo.y, 16);

      // Pot d'échappement (arrière, légèrement sous le chassis)
      gfx.fillStyle(0x777777);
      const exhaust = [
        local(-42, 2), local(-58, 0), local(-58, 8), local(-42, 10)
      ];
      gfx.beginPath();
      gfx.moveTo(exhaust[0].x, exhaust[0].y);
      exhaust.forEach(p => gfx.lineTo(p.x, p.y));
      gfx.closePath();
      gfx.fillPath();
      gfx.lineStyle(1.5, 0x333333);
      gfx.strokePath();

      // Guidon (du chassis vers le haut, à l'avant)
      gfx.lineStyle(4, 0x222222);
      const hbase = local(28, -5);
      const hbar = local(26, -28);
      gfx.lineBetween(hbase.x, hbase.y, hbar.x, hbar.y);
      gfx.fillStyle(0x222222);
      gfx.fillCircle(hbar.x, hbar.y, 4);

      // === PILOTE (toutes coords avec Y négatif = au-dessus) ===
      const hip = local(-22, -18);       // bassin (sur la selle)
      const knee = local(2, -16);         // genou plié vers l'avant
      const foot = local(2, -2);          // pied sur le repose-pieds
      const shoulder = local(-8, -38);    // épaule (penchée en avant)
      const elbow = local(8, -32);        // coude
      const helmet = local(-2, -52);      // tête
      const visor = local(4, -52);        // visière

      // Jambe (cuisse + tibia)
      gfx.lineStyle(8, 0x222244);
      gfx.lineBetween(hip.x, hip.y, knee.x, knee.y);
      gfx.lineBetween(knee.x, knee.y, foot.x, foot.y);

      // Torse (du bassin à l'épaule, plus épais)
      gfx.lineStyle(16, 0x3344aa);
      gfx.lineBetween(hip.x, hip.y, shoulder.x, shoulder.y);
      // contour torse
      gfx.lineStyle(2, 0x111122);
      gfx.lineBetween(hip.x, hip.y, shoulder.x, shoulder.y);

      // Bras (épaule → coude → guidon)
      gfx.lineStyle(6, 0x3344aa);
      gfx.lineBetween(shoulder.x, shoulder.y, elbow.x, elbow.y);
      gfx.lineBetween(elbow.x, elbow.y, hbar.x, hbar.y);
      // contour bras
      gfx.lineStyle(1.5, 0x111122);
      gfx.lineBetween(shoulder.x, shoulder.y, elbow.x, elbow.y);
      gfx.lineBetween(elbow.x, elbow.y, hbar.x, hbar.y);

      // Cou (petit lien entre épaule et casque)
      gfx.lineStyle(6, 0xffaa66);
      gfx.lineBetween(shoulder.x, shoulder.y, helmet.x, helmet.y);

      // Casque (rond orange)
      gfx.fillStyle(0xff8833);
      gfx.fillCircle(helmet.x, helmet.y, 12);
      gfx.lineStyle(2, 0x222222);
      gfx.strokeCircle(helmet.x, helmet.y, 12);

      // Bande blanche sur le casque
      gfx.lineStyle(3, 0xffffff);
      const bandA = local(-7, -55);
      const bandB = local(3, -55);
      gfx.lineBetween(bandA.x, bandA.y, bandB.x, bandB.y);

      // Visière noire
      gfx.fillStyle(0x111122);
      gfx.fillCircle(visor.x, visor.y, 6);
      // reflet bleu
      gfx.fillStyle(0x66aaff, 0.8);
      const reflect = local(5, -53);
      gfx.fillCircle(reflect.x, reflect.y, 2);
    }

    drawAllGhosts() {
      const g = this.ghostsGfx;
      g.clear();
      // Couleurs par défaut pour différencier les joueurs
      const colors = [0x3399ff, 0xff66cc, 0x88ff66, 0xffaa44, 0xaa66ff, 0x66ffff, 0xff4444];
      let idx = 0;
      for (const [id, s] of this.ghosts) {
        const color = colors[idx % colors.length]; idx++;
        const alpha = s.crashed ? 0.3 : 0.7;
        const cos = Math.cos(s.a), sin = Math.sin(s.a);
        // Roues
        const wbx = s.x + (-32) * cos - 21 * sin;
        const wby = s.y + (-32) * sin + 21 * cos;
        const wfx = s.x + 32 * cos - 21 * sin;
        const wfy = s.y + 32 * sin + 21 * cos;
        g.fillStyle(0x111111, alpha);
        g.fillCircle(wbx, wby, 17);
        g.fillCircle(wfx, wfy, 17);
        g.lineStyle(2, color, alpha);
        g.strokeCircle(wbx, wby, 17);
        g.strokeCircle(wfx, wfy, 17);
        // Châssis
        g.fillStyle(color, alpha);
        const w = 90, h = 18;
        const corners = [[-w/2, -h/2], [w/2, -h/2], [w/2, h/2], [-w/2, h/2]]
          .map(([x, y]) => [s.x + x*cos - y*sin, s.y + x*sin + y*cos]);
        g.beginPath();
        g.moveTo(corners[0][0], corners[0][1]);
        corners.forEach(c => g.lineTo(c[0], c[1]));
        g.closePath();
        g.fillPath();
        // Casque
        const cAngle = s.a - Math.PI / 2;
        const hx = s.x + Math.cos(cAngle) * 38;
        const hy = s.y + Math.sin(cAngle) * 38;
        g.fillStyle(color, alpha);
        g.fillCircle(hx, hy, 11);
        // Pseudo flottant au-dessus
        if (s.pseudo) {
          if (!s._label) {
            s._label = this.add.text(0, 0, s.pseudo, {
              font: 'bold 12px sans-serif',
              color: '#ffffff',
              backgroundColor: '#000a',
              padding: { x: 4, y: 2 }
            }).setOrigin(0.5);
          }
          s._label.setPosition(s.x, s.y - 70);
          s._label.setAlpha(alpha + 0.2);
        }
      }
    }

    // Overlay de fin de map en mode salon privé : scoreboard + replay du gagnant

      this.challengeEnded = true;

      const h = this.scale.height;
      const isLastMap = !!msg.isLastMap;

      // Sauvegarde le résultat de cette map (ajout à results pour le récap final)
      const myScoreLine = (msg.scores || []).find(s => s.id === ServerConn.myId);
      this.results = (this.results || []).concat([{
        seqIdx: msg.seqIdx,
        mapIdx: msg.mapIdx,
        scores: msg.scores || [],
        myTime: myScoreLine ? myScoreLine.time : null
      }]);

      this.serverEndOverlay = this.add.container(0, 0).setScrollFactor(0);
      const bg = this.add.rectangle(0, 0, w, h, 0x000000, 0.78).setOrigin(0);
      this.serverEndOverlay.add(bg);

      const title = this.add.text(w / 2, 80, isLastMap ? 'DERNIÈRE MAP TERMINÉE' : `MAP ${msg.seqIdx + 1} TERMINÉE`, {
        font: 'bold 36px sans-serif', color: '#ffdd44',
        stroke: '#000', strokeThickness: 5
      }).setOrigin(0.5);
      this.serverEndOverlay.add(title);

      this.add.text(w / 2, 120, LEVELS[msg.mapIdx].name, {
        font: '15px sans-serif', color: '#aaa'
      }).setOrigin(0.5).setScrollFactor(0);

      // Top scores
      this.add.text(w / 2, 160, '🏆  TOP  🏆', {
        font: 'bold 14px sans-serif', color: '#ffdd44'
      }).setOrigin(0.5).setScrollFactor(0);
      const myId = ServerConn.myId;
      const medals = ['🥇', '🥈', '🥉', '4.', '5.', '6.', '7.', '8.'];
      (msg.scores || []).slice(0, 8).forEach((s, i) => {
        const isMe = s.id === myId;
        const line = `${medals[i] || (i + 1) + '.'}  ${s.pseudo}${isMe ? ' (toi)' : ''}  —  ${s.time.toFixed(2)}s`;
        const t = this.add.text(w / 2, 195 + i * 26, line, {
          font: 'bold 15px monospace',
          color: isMe ? '#ffdd44' : (i === 0 ? '#ffdd44' : '#fff')
        }).setOrigin(0.5).setScrollFactor(0);
        this.serverEndOverlay.add(t);
      });
      if (!msg.scores || msg.scores.length === 0) {
        const t = this.add.text(w / 2, 200, 'aucun joueur n\'a fini', {
          font: 'bold 16px sans-serif', color: '#ff8866'
        }).setOrigin(0.5).setScrollFactor(0);
        this.serverEndOverlay.add(t);
      }

      // Aperçu map suivante (si pas la dernière)
      if (!isLastMap) {
        const nextSeq = msg.seqIdx + 1;
        const nextMapIdx = this.mapSequence[nextSeq];
        if (nextMapIdx !== undefined) {
          this.add.text(w / 2 + 170, h / 2 + 20, '➡  MAP SUIVANTE', {
            font: 'bold 11px sans-serif', color: '#ffaa66'
          }).setOrigin(0.5).setScrollFactor(0);
          this.drawMapPreviewMini(w / 2 + 170, h / 2 + 70, nextMapIdx, 220, 80);
          this.add.text(w / 2 + 170, h / 2 + 120, LEVELS[nextMapIdx].name, {
            font: 'bold 12px sans-serif', color: '#fff'
          }).setOrigin(0.5).setScrollFactor(0);
        }
      }

      // Note : pas de bouton replay pendant la transition d'un BO en salon privé
      // (sortir de la GameScene mid-BO casserait la sync avec le serveur).
      // Les replays sont dispos à la fin du BO via PrivateBOEndScene.

      // Décompte avant la prochaine map (ou fin de BO)
      const countdownText = this.add.text(w / 2, h - 60, '', {
        font: 'bold 20px sans-serif', color: '#ffdd44'
      }).setOrigin(0.5).setScrollFactor(0);
      this.serverEndOverlay.add(countdownText);
      const updateCountdown = () => {
        if (!this.serverEndOverlay) return;
        const remaining = Math.max(0, (msg.nextAt - Date.now()) / 1000);
        countdownText.setText(isLastMap
          ? `Récap final dans ${remaining.toFixed(1)}s`
          : `Map suivante dans ${remaining.toFixed(1)}s`);
      };
      updateCountdown();
      this.privateCountdownInterval = setInterval(updateCountdown, 200);
    }

    drawMapPreviewMini(cx, cy, levelIdx, w, h) {
      const lvl = LEVELS[levelIdx];
      if (!lvl || !lvl.terrain) return;
      const g = this.add.graphics().setScrollFactor(0);
      const isCave = lvl.tier === 2;
      g.fillStyle(isCave ? 0x1a0e0a : 0x87CEEB);
      g.fillRoundedRect(cx - w / 2, cy - h / 2, w, h, 6);
      g.lineStyle(2, 0x444444);
      g.strokeRoundedRect(cx - w / 2, cy - h / 2, w, h, 6);
      const points = lvl.terrain;
      let minX = points[0].x, maxX = points[0].x, minY = points[0].y, maxY = points[0].y;
      for (const p of points) {
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
      }
      if (lvl.finishX !== undefined && lvl.finishX > maxX) maxX = lvl.finishX;
      const padX = 8, padY = 8;
      const sx = (w - padX * 2) / Math.max(1, maxX - minX);
      const sy = (h - padY * 2) / Math.max(1, maxY - minY + 100);
      const sc = Math.min(sx, sy);
      const ox = cx - w / 2 + padX, oy = cy - h / 2 + padY;
      const tx = (px) => ox + (px - minX) * sc;
      const ty = (py) => oy + (py - minY) * sc;
      g.fillStyle(0x4a3a2a);
      g.beginPath();
      g.moveTo(tx(points[0].x), cy + h / 2 - padY);
      g.lineTo(tx(points[0].x), ty(points[0].y));
      points.forEach(p => g.lineTo(tx(p.x), ty(p.y)));
      g.lineTo(tx(points[points.length - 1].x), cy + h / 2 - padY);
      g.closePath();
      g.fillPath();
    }
