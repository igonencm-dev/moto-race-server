    }

    handleNextMapChosen(msg) {
      if (!this.serverEndOverlay || !this.serverNextMapText) return;
      const name = LEVELS[msg.nextMapIdx].name;
      const tag = msg.wasRandom
        ? `(aléatoire par ${msg.nextMapChosenBy})`
        : `(choisi par ${msg.nextMapChosenBy})`;
      this.serverNextMapText.setText(`Prochaine : ${name} ${tag}`);
      // Update highlight des boutons
      if (this.voteButtons) {
        for (const { btn, mapIdx } of this.voteButtons) {
          const highlight = (mapIdx === msg.nextMapIdx);
          btn.setStyle({
            color: highlight ? '#000' : '#ddd',
            backgroundColor: highlight ? '#ffdd44' : '#333'
          });
        }
      }
      this.currentNextMapIdx = msg.nextMapIdx;
    }

    drawGhost() {
      const g = this.ghostGfx;
      g.clear();
      const s = this.ghostState;
      const alpha = s.crashed ? 0.3 : 0.75;
      const cos = Math.cos(s.a), sin = Math.sin(s.a);

      // roues
      const wbx = s.x + (-25) * cos - 16 * sin;
      const wby = s.y + (-25) * sin + 16 * cos;
      const wfx = s.x + 25 * cos - 16 * sin;
      const wfy = s.y + 25 * sin + 16 * cos;

      g.fillStyle(0x111111, alpha);
      g.fillCircle(wbx, wby, 13);
      g.fillCircle(wfx, wfy, 13);
      g.lineStyle(2, 0x3399ff, alpha);
      g.strokeCircle(wbx, wby, 13);
      g.strokeCircle(wfx, wfy, 13);
      // rayons
      g.lineStyle(1.5, 0x99ccff, alpha);
      for (let i = 0; i < 4; i++) {
        const a = s.wba + i * Math.PI / 4;
        g.lineBetween(wbx, wby, wbx + Math.cos(a) * 11, wby + Math.sin(a) * 11);
        const a2 = s.wfa + i * Math.PI / 4;
        g.lineBetween(wfx, wfy, wfx + Math.cos(a2) * 11, wfy + Math.sin(a2) * 11);
      }

      // châssis
      g.fillStyle(0x3399ff, alpha);
      g.lineStyle(2, 0x1166cc, alpha);
      const w = 70, h = 14;
      const corners = [[-w / 2, -h / 2], [w / 2, -h / 2], [w / 2, h / 2], [-w / 2, h / 2]]
        .map(([x, y]) => [s.x + x * cos - y * sin, s.y + x * sin + y * cos]);
      g.beginPath();
      g.moveTo(corners[0][0], corners[0][1]);
      corners.forEach(c => g.lineTo(c[0], c[1]));
      g.closePath();
      g.fillPath();
      g.strokePath();

      // pilote
      const cAngle = s.a - Math.PI / 2;
      const px = s.x + Math.cos(cAngle) * 16;
      const py = s.y + Math.sin(cAngle) * 16;
      g.fillStyle(0x224488, alpha);
      const bw = 14, bh = 20;
      const bcorners = [[-bw / 2, -bh / 2], [bw / 2, -bh / 2], [bw / 2, bh / 2], [-bw / 2, bh / 2]]
        .map(([x, y]) => [px + x * cos - y * sin, py + x * sin + y * cos]);
      g.beginPath();
      g.moveTo(bcorners[0][0], bcorners[0][1]);
      bcorners.forEach(c => g.lineTo(c[0], c[1]));
      g.closePath();
      g.fillPath();

      const hx = s.x + Math.cos(cAngle) * 32;
      const hy = s.y + Math.sin(cAngle) * 32;
      g.fillStyle(0x66ccff, alpha);
      g.fillCircle(hx, hy, 8);
    }

    crash() {
      if (this.crashed || this.finished) return;
      this.crashed = true;

      if (this.conn && this.conn.open) {
        try { this.conn.send({ type: 'crashed' }); } catch (e) {}
      }

      if (window.audio) {
        window.audio.playCrash();
        window.audio.stopEngine();
      }

      this.cameras.main.shake(280, 0.018);
      this.cameras.main.flash(120, 255, 60, 60);

      // Mode serveur (public) : auto-restart même map (pas d'écran de fin)
      if (this.mode === 'server') {
        this.time.delayedCall(1400, () => {
          if (this.time.now < this.challengeEndTime - 500 && !this.challengeEnded) {
            this.scene.restart({
              level: this.levelIndex,
              mode: 'server',
              currentMapIdx: this.levelIndex,
              mapStartedAt: this.serverState.mapStartedAt,
              mapDuration: this.serverState.mapDuration,
              existingPlayers: Array.from(this.ghosts.entries()).map(([id, g]) => ({
                id, pseudo: g.pseudo, sessionBest: g.sessionBest
              })),
              sessionBestTime: this.sessionBestTime,
              runCount: this.runCount + 1
            });
          }
        });
        return;
      }

      // Mode private-server : auto-restart même map
      if (this.mode === 'private-server') {
        this.time.delayedCall(1400, () => {
          if (this.time.now < this.challengeEndTime - 500 && !this.challengeEnded) {
            this.scene.restart({
              level: this.levelIndex,
              mode: 'private-server',
              mapSequence: this.mapSequence,
              durationPerMap: this.durationPerMap,
              currentMapIdx: this.currentMapIdx,
              privateMapIdx: this.levelIndex,
              privateMapStartedAt: this.privateState.mapStartedAt,
              privateMapDuration: this.privateState.mapDuration,
              existingPlayers: Array.from(this.ghosts.entries()).map(([id, g]) => ({
                id, pseudo: g.pseudo, sessionBest: g.sessionBest
              })),
              sessionBestTime: this.sessionBestTime,
              runCount: this.runCount + 1,
              bestRunReplay: this.bestRunReplay,
              results: this.results
            });
          }
        });
        return;
      }

      // En mode challenge : auto-restart si encore du temps (solo + multi P2P)
      if (this.challengeMode && this.challengeEndTime !== null) {
        this.time.delayedCall(1400, () => {
          if (this.time.now < this.challengeEndTime - 500) {
            this.scene.restart({
              level: this.levelIndex,
              mode: this.mode,
              conn: this.conn,
              peer: this.peer,
              challengeEndTime: this.challengeEndTime,
              challengeEndAt: this.challengeEndAt,
              sessionBestTime: this.sessionBestTime,
              runCount: this.runCount + 1,
              cachedTop: this.cachedTop,
              peerPseudo: this.peerPseudo,
              peerSessionBest: this.peerSessionBest,
              bestRunReplay: this.bestRunReplay,
              peerBestReplay: this.peerBestReplay,
              mapSequence: this.mapSequence,
              durationPerMap: this.durationPerMap,
              currentMapIdx: this.currentMapIdx,
              results: this.results
            });
          } else {
            this.endChallenge();
          }
        });
        return;
      }

      this.time.delayedCall(900, () => {
        this.scene.pause();
        this.scene.launch('GameOver', {
          mode: 'crash',
          level: this.levelIndex,
          time: this.elapsed,
          gameMode: this.mode,
          conn: this.conn,
          peer: this.peer
        });
      });
    }

    finish() {
      if (this.crashed || this.finished) return;
      this.finished = true;

      let newBest = false;
      // Best perso (localStorage)
      const prev = Player.getBest(this.levelIndex);
      if (prev === null || this.elapsed < prev) {
        Player.setBest(this.levelIndex, this.elapsed);
        newBest = true;
      }
      // Best de la session (challenge)
      if (this.sessionBestTime === null || this.elapsed < this.sessionBestTime) {
        this.sessionBestTime = this.elapsed;
        // Sauvegarde du replay (multi P2P + salon privé)
        if ((this.conn || this.mode === 'private-server') && this.recordingFrames.length > 0) {
          this.bestRunReplay = {
            time: this.elapsed,
            frames: this.recordingFrames.slice(),
            level: this.levelIndex,
            pseudo: Player.getName()
          };
        }
      }
      // Push score sur le leaderboard online (solo + multi + server)
      const pseudo = Player.getName();
      if (pseudo) Leaderboard.submit(this.levelIndex, pseudo, this.elapsed);

      if (this.conn && this.conn.open) {
        try { this.conn.send({ type: 'finished', time: this.elapsed }); } catch (e) {}
      }
      if ((this.mode === 'server' || this.mode === 'private-server') && ServerConn.connected) {
        ServerConn.send({ type: 'finished', time: this.elapsed });
      }

      if (window.audio) {
        window.audio.playFinish();
        window.audio.stopEngine();
      }

      this.cameras.main.flash(300, 255, 255, 100);

      // Mode serveur (public) : auto-restart même map sans transition
      if (this.mode === 'server') {
        this.time.delayedCall(1500, () => {
          if (this.time.now < this.challengeEndTime - 500 && !this.challengeEnded) {
            this.scene.restart({
              level: this.levelIndex,
              mode: 'server',
              currentMapIdx: this.serverState.existingPlayers ? this.serverState.currentMapIdx : this.levelIndex,
              mapStartedAt: this.serverState.mapStartedAt,
              mapDuration: this.serverState.mapDuration,
              existingPlayers: Array.from(this.ghosts.entries()).map(([id, g]) => ({
                id, pseudo: g.pseudo, sessionBest: g.sessionBest
              })),
              sessionBestTime: this.sessionBestTime,
              runCount: this.runCount + 1
            });
          }
          // Si plus de temps, on attend le mapEnd du serveur (event handler)
        });
        return;
      }

      // Mode private-server : idem, le serveur pilote la fin de map
      if (this.mode === 'private-server') {
        this.time.delayedCall(1500, () => {
          if (this.time.now < this.challengeEndTime - 500 && !this.challengeEnded) {
            this.scene.restart({
              level: this.levelIndex,
              mode: 'private-server',
              mapSequence: this.mapSequence,
              durationPerMap: this.durationPerMap,
              currentMapIdx: this.currentMapIdx,
              privateMapIdx: this.levelIndex,
              privateMapStartedAt: this.privateState.mapStartedAt,
              privateMapDuration: this.privateState.mapDuration,
              existingPlayers: Array.from(this.ghosts.entries()).map(([id, g]) => ({
                id, pseudo: g.pseudo, sessionBest: g.sessionBest
              })),
              sessionBestTime: this.sessionBestTime,
              runCount: this.runCount + 1,
              bestRunReplay: this.bestRunReplay,
              results: this.results
            });
          }
        });
        return;
      }

      // En mode challenge : auto-restart si encore du temps (solo + multi P2P)
      if (this.challengeMode && this.challengeEndTime !== null) {
        this.time.delayedCall(1500, () => {
          if (this.time.now < this.challengeEndTime - 500) {
            this.scene.restart({
              level: this.levelIndex,
              mode: this.mode,
              conn: this.conn,
              peer: this.peer,
              challengeEndTime: this.challengeEndTime,
              challengeEndAt: this.challengeEndAt,
              sessionBestTime: this.sessionBestTime,
              runCount: this.runCount + 1,
              cachedTop: this.cachedTop,
              peerPseudo: this.peerPseudo,
              peerSessionBest: this.peerSessionBest,
              bestRunReplay: this.bestRunReplay,
              peerBestReplay: this.peerBestReplay,
              mapSequence: this.mapSequence,
              durationPerMap: this.durationPerMap,
              currentMapIdx: this.currentMapIdx,
              results: this.results
            });
          } else {
            this.endChallenge();
          }
        });
        return;
      }

      this.time.delayedCall(900, () => {
        this.scene.pause();
        this.scene.launch('GameOver', {
          mode: 'win',
          level: this.levelIndex,
          time: this.elapsed,
          newBest,
          gameMode: this.mode,
          opponentTime: this.opponentFinishTime,
          conn: this.conn,
          peer: this.peer
        });
      });
    }
  }

  // ===========================================================
  // SCÈNE GAME OVER (overlay)
  // ===========================================================
  class GameOverScene extends Phaser.Scene {
    constructor() { super('GameOver'); }

    init(data) {
      this.gameOverMode = data.mode;
      this.level = data.level;
      this.gameTime = data.time;
      this.newBest = data.newBest;
      this.gameMode = data.gameMode;
      this.opponentTime = data.opponentTime;
      this.conn = data.conn;
      this.peer = data.peer;
    }

    create() {
      const w = this.scale.width;
      const h = this.scale.height;

      this.add.rectangle(0, 0, w, h, 0x000000, 0.72).setOrigin(0).setScrollFactor(0);

      const isCrash = this.gameOverMode === 'crash';
      const isMulti = this.gameMode !== 'solo';

      let title = isCrash ? 'CRASH !' : 'TERMINÉ !';
      let titleColor = isCrash ? '#ff4444' : '#44ff66';

      if (!isCrash && isMulti && this.opponentTime != null) {
        if (this.gameTime < this.opponentTime) { title = '🏆 GAGNÉ !'; titleColor = '#ffdd44'; }
        else { title = 'PERDU...'; titleColor = '#ff8844'; }
      }

      this.add.text(w / 2, h / 2 - 130, title, {
        font: 'bold 64px sans-serif', color: titleColor,
        stroke: '#000', strokeThickness: 6
      }).setOrigin(0.5).setScrollFactor(0);

      if (!isCrash) {
        this.add.text(w / 2, h / 2 - 50, this.gameTime.toFixed(2) + ' s', {
          font: 'bold 56px monospace', color: '#ffffff',
          stroke: '#000', strokeThickness: 4
        }).setOrigin(0.5).setScrollFactor(0);

        if (this.newBest) {
          this.add.text(w / 2, h / 2 + 5, '★ NOUVEAU MEILLEUR TEMPS ★', {
            font: 'bold 22px sans-serif', color: '#ffdd44',
            stroke: '#000', strokeThickness: 3
          }).setOrigin(0.5).setScrollFactor(0);
        }

        if (isMulti && this.opponentTime != null) {
          this.add.text(w / 2, h / 2 + 40, 'adversaire : ' + this.opponentTime.toFixed(2) + ' s', {
            font: '20px monospace', color: '#aaaaaa'
          }).setOrigin(0.5).setScrollFactor(0);
        } else if (isMulti) {
          this.add.text(w / 2, h / 2 + 40, 'adversaire encore en course...', {
            font: '18px sans-serif', color: '#aaaaaa'
          }).setOrigin(0.5).setScrollFactor(0);
        }
      } else {
        this.add.text(w / 2, h / 2 - 50, 'la moto a touché le sol', {
          font: '20px sans-serif', color: '#cccccc'
        }).setOrigin(0.5).setScrollFactor(0);
      }

      const yButtons = h / 2 + 130;

      this.makeButton(w / 2 - 150, yButtons, 'Recommencer', () => {
        this.scene.stop('Game');
        this.scene.start('Game', {
          level: this.level, mode: this.gameMode,
          conn: this.conn, peer: this.peer
        });
      });

      this.makeButton(w / 2 + 150, yButtons, 'Menu', () => {
        if (this.peer) try { this.peer.destroy(); } catch (e) {}
        this.scene.stop('Game');
        this.scene.start('Menu');
      });

      if (!isCrash && this.gameMode === 'solo' && this.level < LEVELS.length - 1) {
        this.makeButton(w / 2, yButtons + 60, 'Niveau suivant →', () => {
          this.scene.stop('Game');
          this.scene.start('Game', { level: this.level + 1, mode: 'solo' });
        });
      }
    }

    makeButton(x, y, text, onClick) {
      const btn = this.add.text(x, y, text, {
        font: 'bold 20px sans-serif',
        color: '#ffffff',
        backgroundColor: '#ff5533',
        padding: { x: 22, y: 11 }
      }).setOrigin(0.5).setScrollFactor(0).setInteractive({ useHandCursor: true });
      btn.on('pointerover', () => btn.setStyle({ backgroundColor: '#ff7755' }));
      btn.on('pointerout', () => btn.setStyle({ backgroundColor: '#ff5533' }));
      btn.on('pointerdown', onClick);
      return btn;
    }
  }

  // ===========================================================
  // SCÈNE FIN DE CHALLENGE 5 MIN (avec podium online)
  // ===========================================================
  class ChallengeEndScene extends Phaser.Scene {
    constructor() { super('ChallengeEnd'); }

    init(data) {
      this.level = data.level;
      this.sessionBest = data.sessionBest;
      this.runCount = data.runCount;
      this.cachedTop = data.cachedTop;
      this.multiMode = data.multiMode || false;
      this.myPseudo = data.myPseudo || '?';
      this.peerPseudo = data.peerPseudo;
      this.peerSessionBest = data.peerSessionBest !== undefined ? data.peerSessionBest : null;
      this.myReplay = data.myReplay || null;
      this.peerReplay = data.peerReplay || null;
      this.peer = data.peer;
      this.conn = data.conn;
      // Séquence BO
      this.mapSequence = data.mapSequence || [data.level];
      this.durationPerMap = data.durationPerMap || 300;
      this.currentMapIdx = data.currentMapIdx !== undefined ? data.currentMapIdx : 0;
      this.results = data.results || [];
      this.isLastMap = data.isLastMap !== undefined ? data.isLastMap : true;
      this.gameMode = data.gameMode || 'solo';
    }

    async create() {
      const w = this.scale.width;
      const h = this.scale.height;

      this.add.rectangle(0, 0, w, h, 0x000000, 0.85).setOrigin(0).setScrollFactor(0);

      // En multi : écoute le signal nextMap envoyé par le host
      if (this.multiMode && this.conn) {
        this.peerListener = (data) => {
          if (data && data.type === 'nextMap') {
            this.goToNextMap(data.challengeEndAt, data.peerSessionBest);
          }
        };
        try { this.conn.on('data', this.peerListener); } catch (e) {}
        this.events.on('shutdown', () => {
          if (this.conn && this.peerListener) {
            try { this.conn.off('data', this.peerListener); } catch (e) {}
          }
        });
      }

      const isHost = this.gameMode === 'multi-host';

      if (!this.isLastMap) {
        // ============== TRANSITION ENTRE 2 MAPS ==============
        this.renderIntermediate(w, h, isHost);
      } else if (this.mapSequence.length > 1) {
        // ============== FIN DE BO (récap des maps) ==============
        if (this.multiMode) this.renderBOMulti(w, h);
        else this.renderBOSolo(w, h);
      } else if (this.multiMode) {
        // ============== MULTI 1 SEULE MAP ==============
        this.renderMultiSingle(w, h);
      } else {
        // ============== SOLO 1 SEULE MAP : podium mondial ==============
        await this.renderSoloSingle(w, h);
      }
    }

    // -------------------- TRANSITION INTERMÉDIAIRE --------------------
    renderIntermediate(w, h, isHost) {
      const totalMaps = this.mapSequence.length;
      const currentNum = this.currentMapIdx + 1;

      this.add.text(w / 2, h / 2 - 220, `MAP ${currentNum} / ${totalMaps} TERMINÉE`, {
        font: 'bold 44px sans-serif',
        color: '#ffdd44',
        stroke: '#000', strokeThickness: 5
      }).setOrigin(0.5).setScrollFactor(0);

      this.add.text(w / 2, h / 2 - 175, LEVELS[this.level].name, {
        font: '18px sans-serif', color: '#aaaaaa'
      }).setOrigin(0.5).setScrollFactor(0);

      // Score sur cette map
      const myStr = this.sessionBest !== null ? this.sessionBest.toFixed(2) + 's' : 'DNF';
      const peerStr = this.peerSessionBest !== null ? this.peerSessionBest.toFixed(2) + 's' : 'DNF';

      if (this.multiMode) {
        // Détermine vainqueur de cette map
        let mapWinner = null;
        if (this.sessionBest !== null && this.peerSessionBest !== null) {
          mapWinner = this.sessionBest < this.peerSessionBest ? this.myPseudo : (this.peerPseudo || '?');
        } else if (this.sessionBest !== null) mapWinner = this.myPseudo;
        else if (this.peerSessionBest !== null) mapWinner = this.peerPseudo || '?';

        if (mapWinner) {
          const isMe = mapWinner === this.myPseudo;
          this.add.text(w / 2, h / 2 - 110, '🏆 ' + mapWinner + ' a gagné cette map', {
            font: 'bold 22px sans-serif',
            color: isMe ? '#44ff66' : '#ff8844'
          }).setOrigin(0.5).setScrollFactor(0);
        } else {
          this.add.text(w / 2, h / 2 - 110, 'aucun temps cette map', {
            font: 'bold 18px sans-serif', color: '#ff8866'
          }).setOrigin(0.5).setScrollFactor(0);
        }

        this.add.text(w / 2 - 130, h / 2 - 50, this.myPseudo + ' (toi)', {
          font: 'bold 14px sans-serif', color: '#ffdd44'
        }).setOrigin(0.5).setScrollFactor(0);
        this.add.text(w / 2 - 130, h / 2 - 22, myStr, {
          font: 'bold 24px monospace', color: '#fff'
        }).setOrigin(0.5).setScrollFactor(0);

        this.add.text(w / 2 + 130, h / 2 - 50, this.peerPseudo || '?', {
          font: 'bold 14px sans-serif', color: '#66ccff'
        }).setOrigin(0.5).setScrollFactor(0);
        this.add.text(w / 2 + 130, h / 2 - 22, peerStr, {
          font: 'bold 24px monospace', color: '#fff'
        }).setOrigin(0.5).setScrollFactor(0);

        this.add.text(w / 2, h / 2 - 35, 'vs', {
          font: 'bold 18px sans-serif', color: '#666'
        }).setOrigin(0.5).setScrollFactor(0);
      } else {
        this.add.text(w / 2, h / 2 - 100, 'ton meilleur temps :', {
          font: '15px sans-serif', color: '#ccc'
        }).setOrigin(0.5).setScrollFactor(0);
        this.add.text(w / 2, h / 2 - 60, myStr, {
          font: 'bold 42px monospace', color: '#fff'
        }).setOrigin(0.5).setScrollFactor(0);
      }

      // Score cumulé du BO
      this.renderRunningTally(w, h / 2 + 20);

      // === Replay du gagnant de la map qui vient de finir ===
      const lastResult = this.results[this.results.length - 1];
      const lastMapWinnerReplay = this.getLastMapWinnerReplay();
      if (lastMapWinnerReplay) {
        this.makeButton(w / 2 - 130, h / 2 + 110, '▶  Replay vainqueur', () => {
          // On garde le contexte BO pour pouvoir revenir à l'écran de transition
          this.scene.stop('Game');
          this.scene.start('Replay', {
            replay: lastMapWinnerReplay,
            level: lastResult.mapIndex,
            returnTo: 'Menu',
            peer: this.peer
          });
        });
      }

      // === Aperçu de la map suivante ===
      const nextIdx = this.currentMapIdx + 1;
      const nextLevelIdx = this.mapSequence[nextIdx];
      if (nextLevelIdx !== undefined) {
        this.drawMapPreview(w / 2 + 130, h / 2 + 110, nextLevelIdx, 220, 80);
        this.add.text(w / 2 + 130, h / 2 + 60, '➡  MAP SUIVANTE', {
          font: 'bold 11px sans-serif', color: '#ffaa66'
        }).setOrigin(0.5).setScrollFactor(0);
        this.add.text(w / 2 + 130, h / 2 + 158, LEVELS[nextLevelIdx].name, {
          font: 'bold 12px sans-serif', color: '#fff'
        }).setOrigin(0.5).setScrollFactor(0);
      }

      // Bouton selon rôle
      const yBtn = h / 2 + 200;
      if (this.multiMode && !isHost) {
        // Guest : attente
        this.add.text(w / 2, yBtn, '⏳  En attente du host...', {
          font: 'bold 18px sans-serif', color: '#aaa'
        }).setOrigin(0.5).setScrollFactor(0);
      } else {
        this.makeButton(w / 2, yBtn, 'Map suivante  →', () => {
          this.startNextMap();
        });
      }
    }

    // Renvoie le replay du gagnant de la dernière map jouée (renderIntermediate)
    getLastMapWinnerReplay() {
      const r = this.results[this.results.length - 1];
      if (!r) return null;
      if (r.mySessionBest !== null && r.peerSessionBest !== null) {
        return r.mySessionBest < r.peerSessionBest ? r.myReplay : r.peerReplay;
      }
      if (r.mySessionBest !== null) return r.myReplay;
      if (r.peerSessionBest !== null) return r.peerReplay;
      return null;
    }

    // Dessine un aperçu miniature d'une map (utilisé pour la map suivante)
    drawMapPreview(cx, cy, levelIdx, w, h) {
      const lvl = LEVELS[levelIdx];
      if (!lvl || !lvl.terrain) return;
      const g = this.add.graphics().setScrollFactor(0);
      // Fond
      const isCave = lvl.tier === 2;
      g.fillStyle(isCave ? 0x1a0e0a : 0x87CEEB);
      g.fillRoundedRect(cx - w / 2, cy - h / 2, w, h, 6);
      g.lineStyle(2, 0x444444);
      g.strokeRoundedRect(cx - w / 2, cy - h / 2, w, h, 6);

      // Calcul du scale
      const points = lvl.terrain;
      let minX = points[0].x, maxX = points[0].x, minY = points[0].y, maxY = points[0].y;
      for (const p of points) {
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
      }
      if (lvl.finishX !== undefined && lvl.finishX > maxX) maxX = lvl.finishX;
      // Plafonds influencent aussi la bbox
      if (lvl.ceilings && lvl.ceilings.length > 0 && lvl.ceilings[0].w === undefined) {
        for (const p of lvl.ceilings) {
          if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
          if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
        }
      }
      const padX = 8, padY = 8;
      const scaleX = (w - padX * 2) / Math.max(1, maxX - minX);
      const scaleY = (h - padY * 2) / Math.max(1, maxY - minY + 100);
      const scale = Math.min(scaleX, scaleY);
      const offsetX = cx - w / 2 + padX;
      const offsetY = cy - h / 2 + padY;
      const tx = (px) => offsetX + (px - minX) * scale;
      const ty = (py) => offsetY + (py - minY) * scale;

      // Terrain (chunks)
      const chunks = [];
      let chunk = [];
      for (let i = 0; i < points.length; i++) {
        chunk.push(points[i]);
        if (points[i].gap && i < points.length - 1) { chunks.push(chunk); chunk = []; }
      }
      if (chunk.length) chunks.push(chunk);
      g.fillStyle(0x4a3a2a);
      for (const c of chunks) {
        if (c.length < 2) continue;
        let cMinX = c[0].x, cMaxX = c[0].x;
        for (const p of c) { if (p.x < cMinX) cMinX = p.x; if (p.x > cMaxX) cMaxX = p.x; }
        g.beginPath();
        g.moveTo(tx(cMinX), cy + h / 2 - padY);
        g.lineTo(tx(c[0].x), ty(c[0].y));
        c.forEach(p => g.lineTo(tx(p.x), ty(p.y)));
        g.lineTo(tx(cMaxX), cy + h / 2 - padY);
        g.closePath();
        g.fillPath();
      }
      // Ligne d'herbe (vert clair sur le dessus)
      g.lineStyle(1.5, 0x55aa44);
      for (let i = 0; i < points.length - 1; i++) {
        if (points[i].gap) continue;
        g.lineBetween(tx(points[i].x), ty(points[i].y), tx(points[i + 1].x), ty(points[i + 1].y));
      }
      // Plafonds (si polygones organiques)
      if (lvl.ceilings && lvl.ceilings.length > 0 && lvl.ceilings[0].w === undefined) {
        const cChunks = [];
        let cChunk = [];
        for (let i = 0; i < lvl.ceilings.length; i++) {
          cChunk.push(lvl.ceilings[i]);
          if (lvl.ceilings[i].gap && i < lvl.ceilings.length - 1) { cChunks.push(cChunk); cChunk = []; }
        }
        if (cChunk.length) cChunks.push(cChunk);
        g.fillStyle(0x4a3a2a);
        for (const c of cChunks) {
          if (c.length < 2) continue;
          let cMinX = c[0].x, cMaxX = c[0].x;
          for (const p of c) { if (p.x < cMinX) cMinX = p.x; if (p.x > cMaxX) cMaxX = p.x; }
          g.beginPath();
          g.moveTo(tx(cMinX), cy - h / 2 + padY);
          g.lineTo(tx(c[0].x), ty(c[0].y));
          c.forEach(p => g.lineTo(tx(p.x), ty(p.y)));
          g.lineTo(tx(cMaxX), cy - h / 2 + padY);
          g.closePath();
          g.fillPath();
        }
      } else if (lvl.ceilings && lvl.ceilings.length > 0) {
        g.fillStyle(0x4a3a2a);
        lvl.ceilings.forEach(c => {
          g.fillRect(tx(c.x - c.w / 2), ty(c.y - c.h / 2), c.w * scale, c.h * scale);
        });
      }
      // Drapeau d'arrivée
      if (lvl.finishX !== undefined) {
        const lastP = points[points.length - 1];
        const fx = tx(lvl.finishX);
        const fyTop = ty(lastP.y - 200);
        const fyBot = ty(lastP.y);
        g.lineStyle(1.5, 0xffffff);
        g.lineBetween(fx, fyTop, fx, fyBot);
        g.fillStyle(0xff5533);
        g.fillTriangle(fx, fyTop, fx + 10, fyTop + 5, fx, fyTop + 10);
      }
      // Obstacles (petits points rouges)
      if (lvl.obstacles) {
        g.fillStyle(0xaa3333);
        lvl.obstacles.forEach(o => g.fillRect(tx(o.x) - 1, ty(o.y) - 1, 2, 2));
      }
    }

    renderRunningTally(w, y) {
      // Affiche les scores des maps déjà jouées (toutes incluses car on est appelé après save)
      const lineY = y;
      this.add.text(w / 2, lineY, 'BILAN EN COURS', {
        font: 'bold 12px sans-serif', color: '#ffaa44'
      }).setOrigin(0.5).setScrollFactor(0);

      this.results.forEach((r, i) => {
        const lvl = LEVELS[r.mapIndex];
        const myStr = r.mySessionBest !== null ? r.mySessionBest.toFixed(2) + 's' : 'DNF';
        let line = `${i + 1}. ${lvl.name}  —  ${myStr}`;
        let color = '#fff';
        if (this.multiMode) {
          const peerStr = r.peerSessionBest !== null ? r.peerSessionBest.toFixed(2) + 's' : 'DNF';
          line = `${i + 1}. ${lvl.name}  ·  ${this.myPseudo}: ${myStr}  ·  ${this.peerPseudo || '?'}: ${peerStr}`;
          // Mark winner of this map
          if (r.mySessionBest !== null && (r.peerSessionBest === null || r.mySessionBest < r.peerSessionBest)) color = '#44ff66';
          else if (r.peerSessionBest !== null && (r.mySessionBest === null || r.peerSessionBest < r.mySessionBest)) color = '#ff8844';
          else color = '#aaa';
        }
        this.add.text(w / 2, lineY + 22 + i * 20, line, {
          font: 'bold 12px monospace', color
        }).setOrigin(0.5).setScrollFactor(0);
      });
    }

    startNextMap() {
      const nextIdx = this.currentMapIdx + 1;
      const nextLevel = this.mapSequence[nextIdx];
      const challengeEndAt = Date.now() + 3000 + this.durationPerMap * 1000;

      if (this.multiMode && this.conn && this.conn.open) {
        try {
          this.conn.send({
            type: 'nextMap',
            challengeEndAt,
            peerSessionBest: this.sessionBest // ce que MOI j'ai fait sur la map qui vient de finir, du POV du peer c'est SON best
          });
        } catch (e) {}
      }
      this.transitionToMap(nextIdx, nextLevel, challengeEndAt);
    }

    goToNextMap(challengeEndAt, peerBestForLastMap) {
      // Le host vient d'envoyer nextMap. Le peer's "peerSessionBest" reçu est en fait son best sur la map qui vient de finir.
      // On l'ajoute aux derniers résultats si c'est une donnée fraîche.
      if (peerBestForLastMap !== undefined && this.results.length > 0) {
        const last = this.results[this.results.length - 1];
        if (last.peerSessionBest === null
            || (peerBestForLastMap !== null && peerBestForLastMap < last.peerSessionBest)) {
          last.peerSessionBest = peerBestForLastMap;
        }
      }
      const nextIdx = this.currentMapIdx + 1;
      const nextLevel = this.mapSequence[nextIdx];
      this.transitionToMap(nextIdx, nextLevel, challengeEndAt);
    }

    transitionToMap(nextIdx, nextLevel, challengeEndAt) {
      this.scene.stop('Game');
      this.scene.start('Game', {
        level: nextLevel,
        mode: this.gameMode,
        conn: this.conn,
        peer: this.peer,
        challengeEndAt: this.multiMode ? challengeEndAt : null,
        peerPseudo: this.peerPseudo,
        peerSessionBest: null,           // reset pour la nouvelle map
        mapSequence: this.mapSequence,
        durationPerMap: this.durationPerMap,
        currentMapIdx: nextIdx,
        results: this.results
      });
    }

          this.scene.start('Menu');

          this.scene.start('Menu');

    renderBOSolo(w, h) {

      }).setOrigin(0.5).setScrollFactor(0);
      this.add.text(w / 2 - 140, h / 2 + 50, myStr, {
        font: 'bold 26px monospace', color: '#fff'
      }).setOrigin(0.5).setScrollFactor(0);

        font: 'bold 16px sans-serif', color: '#66ccff'
      }).setOrigin(0.5).setScrollFactor(0);

        font: 'bold 26px monospace', color: '#fff'
      }).setOrigin(0.5).setScrollFactor(0);
      this.add.text(w / 2, h / 2 + 35, 'vs', {
        font: 'bold 22px sans-serif', color: '#666'

        this.makeButton(w / 2, h / 2 + 130, 'Retour menu', () => {

    // Renvoie le replay du gagnant de la map courante (myReplay vs peerReplay)
    getWinnerReplay() {
      if (this.sessionBest !== null && this.peerSessionBest !== null) {
        return this.sessionBest < this.peerSessionBest ? this.myReplay : this.peerReplay;
      }
      if (this.sessionBest !== null) return this.myReplay;
      if (this.peerSessionBest !== null) return this.peerReplay;
      return null;
    }

    // Renvoie le replay du gagnant overall du BO (cumul de wins)
    getBOWinnerReplay() {
      let myWins = 0, peerWins = 0;
      let myBestTime = Infinity, peerBestTime = Infinity;
      let myBestReplay = null, peerBestReplay = null;
      this.results.forEach(r => {
        if (r.mySessionBest !== null && (r.peerSessionBest === null || r.mySessionBest < r.peerSessionBest)) myWins++;
        else if (r.peerSessionBest !== null && (r.mySessionBest === null || r.peerSessionBest < r.mySessionBest)) peerWins++;
        // Garde le meilleur replay de chaque
        if (r.myReplay && r.mySessionBest !== null && r.mySessionBest < myBestTime) {
          myBestTime = r.mySessionBest; myBestReplay = r.myReplay;
        }
        if (r.peerReplay && r.peerSessionBest !== null && r.peerSessionBest < peerBestTime) {
          peerBestTime = r.peerSessionBest; peerBestReplay = r.peerReplay;
        }
      });
      if (myWins > peerWins) return myBestReplay;
      if (peerWins > myWins) return peerBestReplay;
      // Égalité : prend le meilleur temps absolu
      if (myBestTime < peerBestTime) return myBestReplay;
      if (peerBestTime < myBestTime) return peerBestReplay;
      return null;
    }

    makeButton(x, y, text, onClick) {

        padding: { x: 22, y: 11 }
      }).setOrigin(0.5).setScrollFactor(0).setInteractive({ useHandCursor: true });
      btn.on('pointerover', () => btn.setStyle({ backgroundColor: '#ff7755' }));
      btn.on('pointerout', () => btn.setStyle({ backgroundColor: '#ff5533' }));
      btn.on('pointerdown', onClick);
      return btn;
    }

  // ===========================================================
  // REPLAY SCENE — lecture d'une run enregistrée (multi P2P)
  // ===========================================================
  // ===========================================================
  // RÉCAP FINAL D'UN BO EN SALON PRIVÉ (N joueurs)
  // ===========================================================
  class PrivateBOEndScene extends Phaser.Scene {
    constructor() { super('PrivateBOEnd'); }

    init(data) {
      this.bestPerMap = data.bestPerMap || [];      // [{seqIdx, mapIdx, scores, winnerId, winnerReplay}]
      this.myId = data.myId;
      this.myPseudo = data.myPseudo || '?';
      this.players = data.players || [];
      // Données du lobby (pour le bouton "Retour au lobby")
      this.roomCode = data.roomCode || null;
      this.hostId = data.hostId || null;
      this.mapSequence = data.mapSequence || null;
      this.durationPerMap = data.durationPerMap || null;
    }

    create() {
      const w = this.scale.width;
      const h = this.scale.height;

      this.add.rectangle(0, 0, w, h, 0x000000, 0.88).setOrigin(0).setScrollFactor(0);

      this.add.text(w / 2, 60, '🏆  BO TERMINÉ', {
        font: 'bold 44px sans-serif', color: '#ffdd44',
        stroke: '#000', strokeThickness: 5
      }).setOrigin(0.5);

      // Calcul des wins par joueur
      const wins = new Map();   // playerId → { pseudo, count }
      this.bestPerMap.forEach(b => {
        if (b.winnerId) {
          const pseudo = (b.scores.find(s => s.id === b.winnerId) || {}).pseudo || '?';
          const cur = wins.get(b.winnerId) || { pseudo, count: 0 };
          cur.count++;
          wins.set(b.winnerId, cur);
        }
      });
      const standings = Array.from(wins.entries())
        .map(([id, v]) => ({ id, pseudo: v.pseudo, wins: v.count }))
        .sort((a, b) => b.wins - a.wins);

      // Vainqueur global
      if (standings.length > 0) {
        const champ = standings[0];
        const isMe = champ.id === this.myId;
        this.add.text(w / 2, 130, '🥇  CHAMPION  🥇', {
          font: 'bold 16px sans-serif', color: '#ffdd44'
        }).setOrigin(0.5);
        this.add.text(w / 2, 175, champ.pseudo + (isMe ? ' (toi)' : ''), {
          font: 'bold 48px sans-serif',
          color: isMe ? '#44ff66' : '#ff8844',
          stroke: '#000', strokeThickness: 5
        }).setOrigin(0.5);
        this.add.text(w / 2, 220, champ.wins + ' map(s) gagnée(s)', {
          font: 'bold 14px sans-serif', color: '#fff'
        }).setOrigin(0.5);
      } else {
        this.add.text(w / 2, 175, 'aucun gagnant', {
          font: 'bold 32px sans-serif', color: '#ff8866'
        }).setOrigin(0.5);
      }

      // Standings (top 5)
      this.add.text(w / 2, 260, 'CLASSEMENT', {
        font: 'bold 12px sans-serif', color: '#ffaa66'
      }).setOrigin(0.5);
      standings.slice(0, 8).forEach((s, i) => {
        const isMe = s.id === this.myId;
        const medal = ['🥇', '🥈', '🥉'][i] || (i + 1) + '.';
        this.add.text(w / 2, 285 + i * 22, `${medal}  ${s.pseudo}${isMe ? ' (toi)' : ''}  —  ${s.wins} win(s)`, {
          font: 'bold 14px monospace',
          color: isMe ? '#ffdd44' : '#fff'
        }).setOrigin(0.5);
      });

      // Détails par map (avec bouton replay du gagnant si dispo)
      const detailY = Math.max(420, 285 + Math.min(8, standings.length) * 22 + 20);

      }).setOrigin(0.5);

        const lvl = LEVELS[b.mapIdx];
        const winner = b.winnerId ? (b.scores.find(s => s.id === b.winnerId) || {}) : null;
        const winStr = winner ? `${winner.pseudo} (${winner.time.toFixed(2)}s)` : 'aucun';
        const txt = `${i + 1}. ${lvl.name}  —  ${winStr}`;
        const yLine = detailY + 25 + i * 30;
        this.add.text(w / 2 - 80, yLine, txt, {
          font: 'bold 13px monospace', color: '#fff'
        }).setOrigin(0.5);
        if (b.winnerReplay) {
          const btn = this.add.text(w / 2 + 180, yLine, '▶  Replay', {
            font: 'bold 11px sans-serif', color: '#fff',
            backgroundColor: '#44aa44', padding: { x: 10, y: 4 }
          }).setOrigin(0.5).setInteractive({ useHandCursor: true });
          btn.on('pointerdown', () => {
            // Au close du replay, on revient sur PrivateBOEnd avec toutes les données
            // (pour pouvoir regarder un autre replay sans perdre le récap ni le salon)
            this.scene.start('Replay', {
              replay: b.winnerReplay,
              level: b.mapIdx,
              returnContext: {
                scene: 'PrivateBOEnd',
                data: {
                  bestPerMap: this.bestPerMap,
                  myId: this.myId,
                  myPseudo: this.myPseudo,
                  players: this.players,
                  roomCode: this.roomCode,
                  hostId: this.hostId,
                  mapSequence: this.mapSequence,
                  durationPerMap: this.durationPerMap
                }
              }
            });
          });
        }
      });

      // Boutons : retour au lobby (garde le salon) ou retour menu (quitte)
      if (this.roomCode) {
        const lobbyBtn = this.add.text(w / 2 - 130, h - 50, '🏠  Retour au lobby', {
          font: 'bold 16px sans-serif', color: '#fff',
          backgroundColor: '#44aa44', padding: { x: 20, y: 12 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        lobbyBtn.on('pointerdown', () => {
          this.scene.stop('Game');
          this.scene.start('PrivateRoom', {
            returnToLobby: true,
            roomCode: this.roomCode,
            hostId: this.hostId,
            mapSequence: this.mapSequence,
            durationPerMap: this.durationPerMap,
            players: this.players
          });
        });
        const menuBtn = this.add.text(w / 2 + 130, h - 50, 'Retour menu', {
          font: 'bold 16px sans-serif', color: '#fff',
          backgroundColor: '#ff5533', padding: { x: 20, y: 12 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        menuBtn.on('pointerdown', () => {
          ServerConn.disconnect();
          this.scene.stop('Game');
          this.scene.start('Menu');
        });
      } else {
        const backBtn = this.add.text(w / 2, h - 50, 'Retour menu', {
          font: 'bold 18px sans-serif', color: '#fff',
          backgroundColor: '#ff5533', padding: { x: 26, y: 12 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        backBtn.on('pointerdown', () => {
          ServerConn.disconnect();
          this.scene.stop('Game');
          this.scene.start('Menu');
        });
      }
    }
  }

  class ReplayScene extends Phaser.Scene {
    constructor() { super('Replay'); }

    init(data) {
      this.replay = data.replay;                    // { time, frames, level, pseudo }
      this.levelIndex = data.level !== undefined ? data.level : (this.replay && this.replay.level) || 0;
      this.returnTo = data.returnTo || 'Menu';
      // returnContext : { scene: 'PrivateBOEnd', data: {...} } — prioritaire sur returnTo
      // Permet de revenir à la scène d'origine avec son state (ex : récap du BO).
      this.returnContext = data.returnContext || null;
      this.peer = data.peer || null;
    }

    create() {
      const level = LEVELS[this.levelIndex];
      const w = this.scale.width;
      const h = this.scale.height;

      this.cameras.main.setBackgroundColor('#87CEEB');

      // Décor d'arrière-plan (ciel/montagnes)
      this.drawBackground();

      // Terrain (visuel uniquement)
      this.terrainGfx = this.add.graphics();
      this.drawTerrainVisual(level.terrain);

      // Obstacles (visuels)
      this.obstaclesGfx = this.add.graphics();
      level.obstacles.forEach(o => this.drawObstacleVisual(o));

      // Plafonds
      this.ceilingsGfx = this.add.graphics();
      if (level.ceilings && level.ceilings.length > 0) {
        if (level.ceilings[0].w !== undefined) {
          level.ceilings.forEach(c => this.drawRectCeilingVisual(c));
        } else {
          this.drawCeilingPathVisual(level.ceilings);
        }
      }

      // Décor (flèches, murs, etc.)
      this.decorGfx = this.add.graphics();
      if (level.decor) level.decor.forEach(d => this.drawDecorVisual(d));

      // Coins et hazards (statiques visuellement)
      this.coinsGfx = this.add.graphics();
      this.hazardsGfx = this.add.graphics();
      this.boostPadGfx = this.add.graphics();
      if (level.coins) level.coins.forEach(c => this.drawCoinVisual(c));
      if (level.hazards) level.hazards.forEach(haz => this.drawHazardVisual(haz));
      if (level.boostPads) level.boostPads.forEach(bp => this.drawBoostPadVisual(bp));

      // Ligne d'arrivée
      this.drawFinishLineVisual(level);

      // Caméra
      this.cameras.main.setBounds(-300, -1000, level.finishX + 700, 2200);

      // Bike (visuel uniquement, pas de physique)
      this.bikeGfx = this.add.graphics();

      // === Lecture du replay ===
      this.replayStartTime = this.time.now;
      this.replayFrames = (this.replay && this.replay.frames) || [];
      this.replaySpeed = 1;
      this.replayPaused = false;

      // === HUD ===
      const overlay = this.add.rectangle(0, 0, w, 60, 0x000000, 0.6).setOrigin(0).setScrollFactor(0);
      this.add.text(20, 20, '▶  REPLAY', {
        font: 'bold 16px sans-serif', color: '#44ff66'
      }).setScrollFactor(0);

      const author = (this.replay && this.replay.pseudo) || '?';
      const replayTime = this.replay ? this.replay.time.toFixed(2) + 's' : '-';
      this.add.text(120, 22, `${author}  —  ${LEVELS[this.levelIndex].name}  —  ${replayTime}`, {
        font: 'bold 13px monospace', color: '#fff'
      }).setScrollFactor(0);

      // Timer du replay
      this.replayTimerText = this.add.text(w - 20, 22, '0.00s', {
        font: 'bold 18px monospace', color: '#ffdd44'
      }).setOrigin(1, 0).setScrollFactor(0);

      // Boutons en bas
      this.makeButton(w / 2 - 130, h - 40, '⏮  Recommencer', () => {
        this.replayStartTime = this.time.now;
      });
      this.makeButton(w / 2, h - 40, this.replayPaused ? '▶ Play' : '❚❚ Pause', () => {
        this.replayPaused = !this.replayPaused;
        this.pauseTime = this.replayPaused ? (this.time.now - this.replayStartTime) : null;
        this.pauseBtn.setText(this.replayPaused ? '▶ Play' : '❚❚ Pause');
        if (!this.replayPaused && this.pauseTime !== null) {
          this.replayStartTime = this.time.now - this.pauseTime;
        }
      }, true);
      this.makeButton(w / 2 + 130, h - 40, '✕  Fermer', () => {
        // Si on a un returnContext, on revient à la scène d'origine avec ses données
        // (utile pour rester dans le récap d'un BO ou dans un salon privé)
        if (this.returnContext) {
          this.scene.start(this.returnContext.scene, this.returnContext.data || {});
        } else {
          this.scene.start(this.returnTo);
        }
      });
    }

    update(time, delta) {
      if (!this.replayFrames.length) return;
      const elapsed = this.replayPaused
        ? (this.pauseTime !== null ? this.pauseTime : 0)
        : (time - this.replayStartTime);

      // Boucle : si on dépasse la dernière frame, repart au début
      const lastFrameT = this.replayFrames[this.replayFrames.length - 1].t;
      const t = elapsed % (lastFrameT + 1500); // pause de 1.5s à la fin avant de relancer

      this.replayTimerText.setText((Math.min(t, lastFrameT) / 1000).toFixed(2) + 's');

      // Trouve les 2 frames qui encadrent t et interpole
      let frame = this.replayFrames[0];
      let nextFrame = frame;
      for (let i = 0; i < this.replayFrames.length - 1; i++) {
        if (this.replayFrames[i].t <= t && this.replayFrames[i + 1].t >= t) {
          frame = this.replayFrames[i];
          nextFrame = this.replayFrames[i + 1];
          break;
        }
        if (i === this.replayFrames.length - 2) {
          frame = this.replayFrames[i + 1];
          nextFrame = frame;
        }
      }

      let fx = frame.x, fy = frame.y, fa = frame.a, fwba = frame.wba, fwfa = frame.wfa;
      if (nextFrame !== frame && nextFrame.t > frame.t) {
        const k = (t - frame.t) / (nextFrame.t - frame.t);
        fx = frame.x + (nextFrame.x - frame.x) * k;
        fy = frame.y + (nextFrame.y - frame.y) * k;
        // Angle interpolation (gestion des sauts de 2π)
        let da = nextFrame.a - frame.a;
        if (da > Math.PI) da -= 2 * Math.PI;
        if (da < -Math.PI) da += 2 * Math.PI;
        fa = frame.a + da * k;
        fwba = frame.wba + (nextFrame.wba - frame.wba) * k;
        fwfa = frame.wfa + (nextFrame.wfa - frame.wfa) * k;
      }

      // Construit un faux "bike" pour drawBike
      const cos = Math.cos(fa), sin = Math.sin(fa);
      const fakeBike = {
        chassis: { position: { x: fx, y: fy }, angle: fa },
        wheelBack: {
          position: { x: fx + (-32) * cos - 18 * sin, y: fy + (-32) * sin + 18 * cos },
          angle: fwba
        },
        wheelFront: {
          position: { x: fx + 32 * cos - 18 * sin, y: fy + 32 * sin + 18 * cos },
          angle: fwfa
        }
      };

      this.drawBike(fakeBike, this.bikeGfx, 0xffaa44);

      // Caméra suit le bike
      this.cameras.main.centerOn(fx + 60, fy - 50);
    }

    // ===== HELPERS VISUEL (versions sans physique) =====

    drawBackground() {
      const level = LEVELS[this.levelIndex];
      const isCave = level.tier === 2;
      const w = this.scale.width;
      const h = this.scale.height;
      if (isCave) {
        this.cameras.main.setBackgroundColor('#1a0e0a');
        const g = this.add.graphics();
        g.fillStyle(0x1a0e0a);
        g.fillRect(-2000, -1000, 12000, 3000);
      } else {
        const g = this.add.graphics();
        // Soleil
        g.fillStyle(0xffeebb, 0.9);
        g.fillCircle(800, 100, 50);
        g.setScrollFactor(0.3);
        // Montagnes au fond
        const mountains = this.add.graphics();
        mountains.setScrollFactor(0.4);
        mountains.fillStyle(0x556677);
        for (let x = -2000; x < 12000; x += 400) {
          mountains.fillTriangle(x, 500, x + 200, 200, x + 400, 500);
        }
      }
    }

    drawTerrainVisual(points) {
      const g = this.terrainGfx;
      // Découpe en chunks (gap)
      const chunks = [];
      let chunk = [];
      for (let i = 0; i < points.length; i++) {
        chunk.push(points[i]);
        if (points[i].gap && i < points.length - 1) {
          chunks.push(chunk);
          chunk = [];
        }
      }
      if (chunk.length) chunks.push(chunk);

      g.fillStyle(0x4a3a2a);
      for (const c of chunks) {
        if (c.length < 2) continue;
        let minX = c[0].x, maxX = c[0].x;
        for (const p of c) {
          if (p.x < minX) minX = p.x;
          if (p.x > maxX) maxX = p.x;
        }
        g.beginPath();
        g.moveTo(minX, 1500);
        g.lineTo(c[0].x, c[0].y);
        c.forEach(p => g.lineTo(p.x, p.y));
        g.lineTo(maxX, 1500);
        g.closePath();
        g.fillPath();
      }
      // Bande d'herbe
      g.fillStyle(0x55aa44);
      for (let i = 0; i < points.length - 1; i++) {
        const origP1 = points[i];
        if (origP1.gap) continue;
        let p1 = origP1;
        let p2 = points[i + 1];
        if (p2.x < p1.x) { const tmp = p1; p1 = p2; p2 = tmp; }
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        if (dx === 0 && dy === 0) continue;
        const len = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const cx = (p1.x + p2.x) / 2;
        const cy = (p1.y + p2.y) / 2;
        const halfL = len / 2, halfH = 5;
        const cs = Math.cos(angle), sn = Math.sin(angle);
        const corners = [[-halfL, -halfH], [halfL, -halfH], [halfL, halfH], [-halfL, halfH]]
          .map(([x, y]) => [cx + x * cs - y * sn, cy + x * sn + y * cs]);
        g.beginPath();
        g.moveTo(corners[0][0], corners[0][1]);
        corners.forEach(c => g.lineTo(c[0], c[1]));
        g.closePath();
        g.fillPath();
      }
    }

    drawObstacleVisual(o) {
      const g = this.obstaclesGfx;
      g.fillStyle(0xaa3333);
      g.fillRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h);
      g.lineStyle(2, 0x661111);
      g.strokeRect(o.x - o.w / 2, o.y - o.h / 2, o.w, o.h);
      g.fillStyle(0xffdd00);
      g.fillRect(o.x - o.w / 2 + 4, o.y - 4, o.w - 8, 3);
    }

    drawRectCeilingVisual(c) {
      const g = this.ceilingsGfx;
      g.fillStyle(0x4a3a2a);
      g.fillRect(c.x - c.w / 2, c.y - c.h / 2, c.w, c.h);
    }

    drawCeilingPathVisual(points) {
      const g = this.ceilingsGfx;
      const chunks = [];
      let chunk = [];
      for (let i = 0; i < points.length; i++) {
        chunk.push(points[i]);
        if (points[i].gap && i < points.length - 1) {
          chunks.push(chunk);
          chunk = [];
        }
      }
      if (chunk.length) chunks.push(chunk);

      g.fillStyle(0x4a3a2a);
      for (const c of chunks) {
        if (c.length < 2) continue;
        let minX = c[0].x, maxX = c[0].x;
        for (const p of c) {
          if (p.x < minX) minX = p.x;
          if (p.x > maxX) maxX = p.x;
        }
        g.beginPath();
        g.moveTo(minX, -800);
        g.lineTo(c[0].x, c[0].y);
        c.forEach(p => g.lineTo(p.x, p.y));
        g.lineTo(maxX, -800);
        g.closePath();
        g.fillPath();
      }
      // Bande d'herbe verte sur la face inférieure
      g.fillStyle(0x55aa44);
      for (const c of chunks) {
        for (let i = 0; i < c.length - 1; i++) {
          const p1 = c[i], p2 = c[i + 1];
          if (p2.x === p1.x && p2.y === p1.y) continue;
          const dx = p2.x - p1.x, dy = p2.y - p1.y;
          const len = Math.sqrt(dx * dx + dy * dy);
          const angle = Math.atan2(dy, dx);
          const cx = (p1.x + p2.x) / 2;
          const cy = (p1.y + p2.y) / 2;
          const halfL = len / 2, halfH = 4;
          const cs = Math.cos(angle), sn = Math.sin(angle);
          const corners = [[-halfL, -halfH], [halfL, -halfH], [halfL, halfH], [-halfL, halfH]]
            .map(([x, y]) => [cx + x * cs - y * sn, cy + x * sn + y * cs]);
          g.beginPath();
          g.moveTo(corners[0][0], corners[0][1]);
          corners.forEach(cn => g.lineTo(cn[0], cn[1]));
          g.closePath();
          g.fillPath();
        }
      }
    }

    drawDecorVisual(d) {
      const g = this.decorGfx;
      if (d.type === 'arrow') {
        const angle = ({ 'right': 0, 'down': Math.PI / 2, 'left': Math.PI, 'up': -Math.PI / 2,
          'down-right': Math.PI / 4, 'down-left': 3 * Math.PI / 4 })[d.dir] || 0;
        const cs = Math.cos(angle), sn = Math.sin(angle);
        const len = d.size || 70, h = len * 0.18;
        const tr = (vx, vy) => [d.x + vx * cs - vy * sn, d.y + vx * sn + vy * cs];
        g.fillStyle(0x44dd44);
        const r = [[-len / 2, -h], [len * 0.25, -h], [len * 0.25, h], [-len / 2, h]].map(([vx, vy]) => tr(vx, vy));
        g.beginPath(); g.moveTo(r[0][0], r[0][1]); r.forEach(p => g.lineTo(p[0], p[1])); g.closePath(); g.fillPath();
        const t1 = tr(len * 0.25, -h * 2.2), t2 = tr(len * 0.25, h * 2.2), t3 = tr(len / 2, 0);
        g.fillTriangle(t1[0], t1[1], t2[0], t2[1], t3[0], t3[1]);
      } else if (d.type === 'wall') {
        g.fillStyle(0x4a3a2a);
        g.fillRect(d.x - d.w / 2, d.y, d.w, d.h);
        g.fillStyle(0x55aa44);
        g.fillRect(d.x + d.w / 2 - 3, d.y, 3, d.h);
      } else if (d.type === 'rockCeiling') {
        g.fillStyle(0x4a3a2a);
        g.fillRect(d.x - d.w / 2, d.y, d.w, d.h);
      }
    }

    drawCoinVisual(c) {
      const g = this.coinsGfx;
      g.fillStyle(0xffdd44);
      g.fillCircle(c.x, c.y, 11);
      g.lineStyle(2, 0xff9900);
      g.strokeCircle(c.x, c.y, 11);
    }

    drawHazardVisual(h) {
      const g = this.hazardsGfx;
      g.fillStyle(0xcc2200);
      g.fillRect(h.x - h.w / 2, h.y - h.h / 2, h.w, h.h);
      g.fillStyle(0xff5500);
      g.fillRect(h.x - h.w / 2, h.y - h.h / 2, h.w, Math.min(8, h.h * 0.25));
    }

    drawBoostPadVisual(bp) {
      const g = this.boostPadGfx;
      g.fillStyle(0xff6622);
      g.fillRoundedRect(bp.x - bp.w / 2, bp.y - bp.h / 2, bp.w, bp.h, 4);
    }

    drawFinishLineVisual(level) {
      if (level.finishX === undefined) return;
      const lastP = level.terrain[level.terrain.length - 1];
      const groundY = lastP.y;
      const g = this.add.graphics();
      g.fillStyle(0xeeeeee);
      g.fillRect(level.finishX - 3, groundY - 500, 6, 500);
      // Drapeau damier
      const flagW = 60, flagH = 50;
      const flagY = groundY - 490;
      const cells = 5;
      const cellW = flagW / cells, cellH = flagH / cells;
      for (let r = 0; r < cells; r++) {
        for (let c = 0; c < cells; c++) {
          g.fillStyle((r + c) % 2 === 0 ? 0x000000 : 0xffffff);
          g.fillRect(level.finishX + 3 + c * cellW, flagY + r * cellH, cellW, cellH);
        }
      }
    }

    // Réutilise la même logique que GameScene.drawBike
    drawBike(bike, gfx, color) {
      gfx.clear();
      const c = bike.chassis;
      const cos = Math.cos(c.angle), sin = Math.sin(c.angle);
      const local = (lx, ly) => ({ x: c.position.x + lx * cos - ly * sin, y: c.position.y + lx * sin + ly * cos });

      // Suspensions
      gfx.lineStyle(5, 0x1a1a1a);
      const susBack = local(-32, 5), susFront = local(32, 5);
      gfx.lineBetween(susBack.x, susBack.y, bike.wheelBack.position.x, bike.wheelBack.position.y);
      gfx.lineBetween(susFront.x, susFront.y, bike.wheelFront.position.x, bike.wheelFront.position.y);

      // Roues
      const drawWheel = (wheel) => {
        const cx = wheel.position.x, cy = wheel.position.y;
        gfx.fillStyle(0x0a0a0a); gfx.fillCircle(cx, cy, 18);
        gfx.lineStyle(2, 0x000000); gfx.strokeCircle(cx, cy, 18);
        gfx.fillStyle(0x999999); gfx.fillCircle(cx, cy, 11);
        gfx.lineStyle(2, 0xdddddd);
        for (let i = 0; i < 6; i++) {
          const a = wheel.angle + i * Math.PI / 3;
          gfx.lineBetween(cx, cy, cx + Math.cos(a) * 10, cy + Math.sin(a) * 10);
        }
      };
      drawWheel(bike.wheelBack);
      drawWheel(bike.wheelFront);

      // Châssis
      gfx.fillStyle(color);
      gfx.lineStyle(2, 0x111111);
      const frame = [local(-40, 6), local(40, 6), local(38, -5), local(-38, -5)];
      gfx.beginPath(); gfx.moveTo(frame[0].x, frame[0].y);
      frame.forEach(p => gfx.lineTo(p.x, p.y));
      gfx.closePath(); gfx.fillPath(); gfx.strokePath();

      // Réservoir
      const tankColor = Phaser.Display.Color.ValueToColor(color).clone().darken(20).color;
      gfx.fillStyle(tankColor);
      const tank = [local(-16, -5), local(20, -5), local(12, -22), local(-12, -22)];
      gfx.beginPath(); gfx.moveTo(tank[0].x, tank[0].y);
      tank.forEach(p => gfx.lineTo(p.x, p.y));
      gfx.closePath(); gfx.fillPath();

      // Selle
      gfx.fillStyle(0x111111);
      const seat = [local(-42, -5), local(-14, -5), local(-12, -16), local(-40, -16)];
      gfx.beginPath(); gfx.moveTo(seat[0].x, seat[0].y);
      seat.forEach(p => gfx.lineTo(p.x, p.y));
      gfx.closePath(); gfx.fillPath();

      // Phare
      const head = local(40, -6);
      gfx.fillStyle(0xffeebb); gfx.fillCircle(head.x, head.y, 6);

      // Pilote (corps simple)
      const torso = local(-2, -28);
      const head2 = local(2, -42);
      gfx.fillStyle(0x2266aa);
      gfx.fillCircle(torso.x, torso.y, 9);
      gfx.fillStyle(0xffccaa);
      gfx.fillCircle(head2.x, head2.y, 7);
      gfx.fillStyle(0x222222);
      gfx.fillCircle(head2.x, head2.y - 1, 8);
    }

    makeButton(x, y, text, onClick, isPause) {
      const btn = this.add.text(x, y, text, {
        font: 'bold 14px sans-serif',
        color: '#fff',
        backgroundColor: '#ff5533',
        padding: { x: 14, y: 6 }
      }).setOrigin(0.5).setScrollFactor(0).setInteractive({ useHandCursor: true });
      btn.on('pointerover', () => btn.setStyle({ backgroundColor: '#ff7755' }));
      btn.on('pointerout', () => btn.setStyle({ backgroundColor: '#ff5533' }));
      btn.on('pointerdown', onClick);
      if (isPause) this.pauseBtn = btn;
      return btn;
    }
  }

  // ===========================================================
  // CONFIG PHASER
  // ===========================================================
  const config = {
    type: Phaser.AUTO,
    parent: 'game',
    width: window.innerWidth,
    height: window.innerHeight,
    scale: {
      mode: Phaser.Scale.RESIZE,
      autoCenter: Phaser.Scale.CENTER_BOTH
    },
    physics: {
      default: 'matter',
      matter: {
        gravity: { y: 1 },
        debug: false
      }
    },
    scene: [MenuScene, HelpScene, GameSetupScene, MultiScene, ServerRoomScene, PrivateRoomScene, LeaderboardScene, GameScene, GameOverScene, ChallengeEndScene, PrivateBOEndScene, ReplayScene]
  };

  const game = new Phaser.Game(config);
  </script>
