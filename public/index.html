  <meta charset="UTF-8">

  <title>Moto Race</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: system-ui, -apple-system, sans-serif; }
    #game { width: 100%; height: 100%; }
    canvas { display: block; }
    #peerOverlay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 25, 40, 0.96);
      color: white;
      padding: 32px;
      border-radius: 14px;
      min-width: 340px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 16px 60px rgba(0,0,0,0.7);
      z-index: 100;
      display: none;
      border: 1px solid rgba(255, 85, 51, 0.3);
    }
    #peerOverlay h2 { margin-bottom: 14px; font-size: 22px; color: #ff5533; }
    #peerOverlay p { margin: 8px 0; font-size: 14px; line-height: 1.4; opacity: 0.9; }
    #peerOverlay input {
      padding: 10px 12px; font-size: 14px; width: 100%; margin: 8px 0;
      border-radius: 6px; border: 1px solid #444; background: #1a1a25;
      color: white; font-family: monospace;
    }
    #peerOverlay input:focus { outline: none; border-color: #ff5533; }
    #peerOverlay button {
      padding: 10px 20px; font-size: 14px; margin: 4px;
      background: #ff5533; color: white; border: none;
      border-radius: 6px; cursor: pointer; font-weight: 600;
      transition: background 0.15s;
    }
    #peerOverlay button:hover { background: #ff7755; }
    #peerOverlay button.secondary { background: #444; }
    #peerOverlay button.secondary:hover { background: #555; }
    #peerOverlay .id-display {
      font-family: monospace; font-size: 18px; background: #1a1a25;
      padding: 12px 14px; border-radius: 6px; margin: 12px 0;
      word-break: break-all; user-select: all; border: 1px dashed #555;
    }
    #peerOverlay .copy-btn { font-size: 12px; padding: 6px 12px; margin-bottom: 12px; }
    #peerOverlay .status {
      font-size: 13px; opacity: 0.75; margin: 12px 0;
      min-height: 20px;
    }
    #peerOverlay .status.error { color: #ff7766; opacity: 1; }
  </style>
</head>

  // ===========================================================
  // SYSTÈME AUDIO (Web Audio API, sons synthétisés)
  // ===========================================================
  class AudioSystem {
    constructor() {
      try {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) { this.ctx = null; return; }
      this.muted = false;
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.07;
      this.musicGain.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = 0.4;
      this.sfxGain.connect(this.ctx.destination);
      this.engineNode = null;
      this.musicPlaying = false;
    }

    resume() {
      if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    }

    startEngine() {
      if (!this.ctx || this.engineNode) return;
      const ctx = this.ctx;
      const baseFreq = 55;

      // 2 saw légèrement detunés → grain métallique riche
      const osc1 = ctx.createOscillator();
      osc1.type = 'sawtooth';
      osc1.frequency.value = baseFreq;
      osc1.detune.value = -10;

      const osc2 = ctx.createOscillator();
      osc2.type = 'sawtooth';
      osc2.frequency.value = baseFreq;
      osc2.detune.value = 10;

      // sub triangle pour le poids dans les graves
      const sub = ctx.createOscillator();
      sub.type = 'triangle';
      sub.frequency.value = baseFreq / 2;

      const mixer = ctx.createGain();
      mixer.gain.value = 0.5;
      osc1.connect(mixer);
      osc2.connect(mixer);
      sub.connect(mixer);

      // bruit léger pour le grain (diesel)
      const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
      const noiseData = noiseBuffer.getChannelData(0);
      for (let i = 0; i < noiseData.length; i++) noiseData[i] = (Math.random() * 2 - 1) * 0.4;
      const noiseSrc = ctx.createBufferSource();
      noiseSrc.buffer = noiseBuffer;
      noiseSrc.loop = true;
      const noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.04;
      noiseSrc.connect(noiseGain);
      noiseGain.connect(mixer);

      // filtre passe-bas avec résonance pour le growl
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 500;
      filter.Q.value = 7;
      mixer.connect(filter);

      // Master gain modulé par LFO (pulsation 4-temps)
      const masterGain = ctx.createGain();
      masterGain.gain.value = 0;
      filter.connect(masterGain);
      masterGain.connect(this.sfxGain);

      // LFO sine pour la pulsation
      const lfo = ctx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 6;
      const lfoDepth = ctx.createGain();
      lfoDepth.gain.value = 0;  // amplitude de modulation, sera réglée par setEngineSpeed
      lfo.connect(lfoDepth);
      lfoDepth.connect(masterGain.gain);

      // Niveau de base (constant) qu'on additionne au LFO
      const baseLevel = ctx.createConstantSource();
      baseLevel.offset.value = 0;
      baseLevel.connect(masterGain.gain);

      osc1.start(); osc2.start(); sub.start();
      noiseSrc.start();
      lfo.start(); baseLevel.start();

      this.engineNode = { osc1, osc2, sub, lfo, lfoDepth, baseLevel, filter, masterGain, noiseSrc };
    }

    setEngineSpeed(speed) {
      if (!this.engineNode) return;
      const t = Math.min(1, Math.max(0, speed));
      const ctx = this.ctx;
      const baseFreq = 55 + t * 130;          // 55 → 185 Hz
      const lfoFreq = 5 + t * 20;             // pulsation 5 → 25 Hz
      const filterFreq = 350 + t * 1400;      // filtre s'ouvre
      const level = 0.05 + t * 0.13;          // volume base
      const lfoAmp = 0.04 + t * 0.05;         // pulsation plus marquée à fond

      this.engineNode.osc1.frequency.setTargetAtTime(baseFreq, ctx.currentTime, 0.07);
      this.engineNode.osc2.frequency.setTargetAtTime(baseFreq, ctx.currentTime, 0.07);
      this.engineNode.sub.frequency.setTargetAtTime(baseFreq / 2, ctx.currentTime, 0.07);
      this.engineNode.lfo.frequency.setTargetAtTime(lfoFreq, ctx.currentTime, 0.07);
      this.engineNode.filter.frequency.setTargetAtTime(filterFreq, ctx.currentTime, 0.07);
      this.engineNode.baseLevel.offset.setTargetAtTime(level, ctx.currentTime, 0.08);
      this.engineNode.lfoDepth.gain.setTargetAtTime(lfoAmp, ctx.currentTime, 0.1);
    }

    stopEngine() {
      if (!this.engineNode) return;
      const node = this.engineNode;
      const ctx = this.ctx;
      node.baseLevel.offset.setTargetAtTime(0, ctx.currentTime, 0.05);
      node.lfoDepth.gain.setTargetAtTime(0, ctx.currentTime, 0.05);
      setTimeout(() => {
        try {
          node.osc1.stop(); node.osc2.stop(); node.sub.stop();
          node.lfo.stop(); node.baseLevel.stop(); node.noiseSrc.stop();
        } catch (e) {}
      }, 300);
      this.engineNode = null;
    }

    playCrash() {
      if (!this.ctx) return;
      const ctx = this.ctx;
      const noise = ctx.createBufferSource();
      const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      noise.buffer = buffer;
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 700;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.6, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(this.sfxGain);
      noise.start();
      noise.stop(ctx.currentTime + 0.5);
    }

    playBump() {
      if (!this.ctx) return;
      const ctx = this.ctx;
      const osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.setValueAtTime(120, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.15);
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start();
      osc.stop(ctx.currentTime + 0.2);
    }

    playFinish() {
      if (!this.ctx) return;
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const t = this.ctx.currentTime + i * 0.12;
        const osc = this.ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.value = freq;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        osc.connect(gain);
        gain.connect(this.sfxGain);
        osc.start(t);
        osc.stop(t + 0.25);
      });
    }

    playFlip() {
      if (!this.ctx) return;
      const ctx = this.ctx;
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(220, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.3);
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start();
      osc.stop(ctx.currentTime + 0.3);
    }

    playClick() {
      if (!this.ctx) return;
      const ctx = this.ctx;
      const osc = ctx.createOscillator();
      osc.type = 'square';
      osc.frequency.value = 600;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
      osc.connect(gain);
      gain.connect(this.sfxGain);
      osc.start();
      osc.stop(ctx.currentTime + 0.06);
    }

    startMusic() {
      if (!this.ctx || this.musicPlaying) return;
      this.musicPlaying = true;
      const tempo = 110;
      const beat = 60 / tempo;
      // arpèges en Am — Am/F/C/G
      const chords = [
        [220, 261, 329],  // Am
        [174, 220, 261],  // F
        [261, 329, 392],  // C
        [196, 246, 294]   // G
      ];

      const playLoop = (startT) => {
        if (!this.musicPlaying) return;
        let t = startT;
        chords.forEach(chord => {
          for (let step = 0; step < 8; step++) {
            const freq = chord[step % chord.length] * (step >= 4 ? 2 : 1);
            const noteT = t + step * beat * 0.5;
            const osc = this.ctx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            const gain = this.ctx.createGain();
            gain.gain.setValueAtTime(0, noteT);
            gain.gain.linearRampToValueAtTime(0.13, noteT + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, noteT + beat * 0.45);
            osc.connect(gain);
            gain.connect(this.musicGain);
            osc.start(noteT);
            osc.stop(noteT + beat * 0.5);
          }
          // bass
          const bassOsc = this.ctx.createOscillator();
          bassOsc.type = 'sine';
          bassOsc.frequency.value = chord[0] / 2;
          const bassGain = this.ctx.createGain();
          bassGain.gain.setValueAtTime(0, t);
          bassGain.gain.linearRampToValueAtTime(0.18, t + 0.05);
          bassGain.gain.setValueAtTime(0.18, t + beat * 3.5);
          bassGain.gain.exponentialRampToValueAtTime(0.001, t + beat * 4);
          bassOsc.connect(bassGain);
          bassGain.connect(this.musicGain);
          bassOsc.start(t);
          bassOsc.stop(t + beat * 4);
          t += beat * 4;
        });
        const total = beat * 4 * chords.length;
        this.musicTimeout = setTimeout(() => playLoop(this.ctx.currentTime), total * 1000 - 50);
      };

      playLoop(this.ctx.currentTime);
    }

    stopMusic() {
      this.musicPlaying = false;
      if (this.musicTimeout) clearTimeout(this.musicTimeout);
    }

    setMusicVolume(v) {
      if (this.musicGain) this.musicGain.gain.value = v;
    }

    toggleMute() {
      if (!this.ctx) return;
      this.muted = !this.muted;
      this.musicGain.gain.value = this.muted ? 0 : 0.07;
      this.sfxGain.gain.value = this.muted ? 0 : 0.4;
      return this.muted;
    }
  }

  // ===========================================================
  // CONNEXION SALON SERVEUR (WebSocket)
  // L'URL est récupérée depuis localStorage si custom, sinon localhost.
  // Une fois le serveur déployé, l'URL peut être changée via le menu.
  // ===========================================================
  // Si la page est servie par le serveur Railway, on connecte au même host. Sinon fallback Railway.
  const DEFAULT_SERVER_URL = (function() {
    if (location.protocol === 'https:') return 'wss://' + location.host;
    if (location.protocol === 'http:' && location.host && location.hostname !== '') return 'ws://' + location.host;
    return 'wss://moto-race-server-production.up.railway.app';
  })();

  const ServerConn = {
    ws: null,
    connected: false,
    myId: null,
    pseudo: null,
    listeners: {},

    getUrl() {
      return localStorage.getItem('serverUrl') || DEFAULT_SERVER_URL;
    },
    setUrl(url) {
      localStorage.setItem('serverUrl', url);
    },

    on(event, cb) {
      if (!this.listeners[event]) this.listeners[event] = [];
      this.listeners[event].push(cb);
    },
    off(event, cb) {
      if (!this.listeners[event]) return;
      this.listeners[event] = this.listeners[event].filter(f => f !== cb);
    },
    emit(event, data) {
      (this.listeners[event] || []).forEach(cb => {
        try { cb(data); } catch (e) { console.warn(e); }
      });
    },

    connect(pseudo, room = 'main') {
      this.pseudo = pseudo;
      return new Promise((resolve, reject) => {
        try {
          this.ws = new WebSocket(this.getUrl());
        } catch (e) { reject(e); return; }

        const timeout = setTimeout(() => {
          if (!this.connected) {
            try { this.ws.close(); } catch (e) {}
            reject(new Error('timeout'));
          }
        }, 8000);

        this.ws.onopen = () => {
          this.connected = true;
          this.ws.send(JSON.stringify({ type: 'join', pseudo, room }));
        };
        this.ws.onmessage = (evt) => {
          let msg;
          try { msg = JSON.parse(evt.data); } catch (e) { return; }
          if (msg.type === 'joined') {
            this.myId = msg.myId;
            clearTimeout(timeout);
            this.emit('joined', msg);
            resolve(msg);
          } else {
            this.emit(msg.type, msg);
          }
        };
        this.ws.onclose = () => {
          this.connected = false;
          this.emit('close');
        };
        this.ws.onerror = (err) => {
          clearTimeout(timeout);
          this.emit('error', err);
          if (!this.connected) reject(err);
        };
      });
    },

    send(msg) {
      if (this.ws && this.ws.readyState === WebSocket.OPEN) {
        try { this.ws.send(JSON.stringify(msg)); } catch (e) {}
      }
    },

    disconnect() {
      this.connected = false;
      this.myId = null;
      this.listeners = {};
      if (this.ws) {
        try { this.ws.close(); } catch (e) {}
        this.ws = null;
      }
    }
  };

        this.scoreTexts.push(t);
      });

      // Si le user n'est pas dans le top 10, montre son rang séparément
      if (myName && !top.some(s => s.pseudo === myName)) {
        // Fetch tous les scores du level pour trouver le rang
        const ranking = await Leaderboard.top(idx, 100);
        if (this.selectedMap !== idx) return;
        // Pour chaque pseudo, garder le meilleur temps
        const bestByPseudo = {};
        for (const s of ranking) {
          if (!bestByPseudo[s.pseudo] || parseFloat(s.time) < parseFloat(bestByPseudo[s.pseudo].time)) {
            bestByPseudo[s.pseudo] = s;
          }
        }
        const sorted = Object.values(bestByPseudo).sort((a, b) => parseFloat(a.time) - parseFloat(b.time));
        const myRank = sorted.findIndex(s => s.pseudo === myName);
        if (myRank >= 0) {
          const me = sorted[myRank];
          const t = this.add.text(w / 2, this.scoresStartY + 11 * 28 + 12,
            `…   #${myRank + 1}   ${myName}   —   ${parseFloat(me.time).toFixed(2)}s`, {
            font: 'bold 16px monospace',
            color: '#ff8833',
            stroke: '#000', strokeThickness: 2
          }).setOrigin(0.5);
          this.scoreTexts.push(t);
        }
      }
    }
  }

  // ===========================================================
  // SCÈNE SÉLECTION DE NIVEAU
  // ===========================================================
  class GameSetupScene extends Phaser.Scene {
    constructor() { super('GameSetup'); }

    init(data) {
      this.multiMode = data.multiMode || false;
      this.conn = data.conn || null;
      this.peer = data.peer || null;
      this.peerPseudo = data.peerPseudo || null;
    }

    create() {
      const w = this.scale.width;
      const h = this.scale.height;
      this.cameras.main.setBackgroundColor('#1a2030');

      this.selectedMaps = [];
      this.duration = 300;
      this.currentTier = 1;

      // Titre
      this.add.text(w / 2, 36, 'CONFIGURATION', {
        font: 'bold 32px sans-serif',
        color: '#ff5533',
        stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5);

      const subtitle = this.multiMode
        ? '⚔️  MULTI — choisis 1 à 3 maps + durée'
        : 'Choisis 1 à 3 maps · BO1 / BO2 / BO3';
      this.add.text(w / 2, 68, subtitle, {
        font: '13px sans-serif',
        color: '#aaaaaa'
      }).setOrigin(0.5);

      // === Tier tabs (Niveau 1 / Niveau 2) ===
      this.tierTabs = [];
      const tiers = this.getAvailableTiers();
      const tabSpacing = 160;
      tiers.forEach((tier, idx) => {
        const x = w / 2 + (idx - (tiers.length - 1) / 2) * tabSpacing;
        const tab = this.add.text(x, 100, `🏆  NIVEAU ${tier}`, {
          font: 'bold 14px sans-serif',
          color: '#ccc',
          backgroundColor: '#222a3a',
          padding: { x: 18, y: 8 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        tab.on('pointerdown', () => this.switchTier(tier));
        this.tierTabs.push({ btn: tab, tier });
      });

      // === Durée par map (juste après les tabs, avant la grille) ===
      this.add.text(w / 2, 142, 'DURÉE PAR MAP', {
        font: 'bold 11px sans-serif',
        color: '#ffaa66'
      }).setOrigin(0.5);
      this.durationButtons = [];
      [
        { label: '1 min', val: 60 },
        { label: '3 min', val: 180 },
        { label: '5 min', val: 300 }
      ].forEach((opt, idx) => {
        const x = w / 2 + (idx - 1) * 100;
        const btn = this.add.text(x, 168, opt.label, {
          font: 'bold 14px sans-serif',
          color: '#aaa',
          backgroundColor: '#222a3a',
          padding: { x: 16, y: 6 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        btn.on('pointerdown', () => {
          this.duration = opt.val;
          this.refreshUI();
        });
        this.durationButtons.push({ btn, val: opt.val });
      });

      this.counterText = this.add.text(w / 2, 200, '0 / 3 maps sélectionnées', {
        font: 'bold 12px sans-serif',
        color: '#aaa'
      }).setOrigin(0.5);

      // === Grille de cartes (en dessous, scrollable si trop) ===
      this.mapCards = [];
      this.cardsStartY = 232;
      this.renderCards();

      // Bouton LANCER (bas)
      this.goBtn = this.add.text(w / 2, h - 40, 'LANCER', {
        font: 'bold 22px sans-serif',
        color: '#777',
        backgroundColor: '#333',
        padding: { x: 30, y: 11 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      this.goBtn.on('pointerdown', () => this.startGame());

      // Retour menu
      const back = this.add.text(20, 20, '← Menu', {
        font: 'bold 13px sans-serif',
        color: '#aaa',
        backgroundColor: '#333',
        padding: { x: 12, y: 7 }
      }).setInteractive({ useHandCursor: true });
      back.on('pointerdown', () => {
        if (this.multiMode && this.peer) { try { this.peer.destroy(); } catch (e) {} }
        this.scene.start('Menu');
      });

      // Pseudo
      const pseudo = Player.getName();
      if (pseudo) {
        this.add.text(w - 20, 22, '👤 ' + pseudo, {
          font: 'bold 13px sans-serif',
          color: '#ffdd44',
          backgroundColor: '#222a3a',
          padding: { x: 11, y: 5 }
        }).setOrigin(1, 0);
      }

      this.refreshUI();
    }

    getAvailableTiers() {
      const tiers = new Set();
      LEVELS.forEach(lv => tiers.add(lv.tier || 1));
      return Array.from(tiers).sort();
    }

    switchTier(tier) {
      if (tier === this.currentTier) return;
      this.currentTier = tier;
      this.selectedMaps = [];
      this.mapCards.forEach(card => card.container.destroy());
      this.mapCards = [];
      this.renderCards();
      this.refreshUI();
    }

    renderCards() {
      const w = this.scale.width;
      const h = this.scale.height;
      const tierMaps = LEVELS.map((lv, i) => ({ lv, i }))
        .filter(({ lv }) => (lv.tier || 1) === this.currentTier);
      const cols = 5;
      const availH = h - this.cardsStartY - 90;
      const rows = Math.ceil(tierMaps.length / cols);
      const cardW = Math.min(240, (w - 80) / cols - 10);
      const cardH = Math.min(120, (availH - (rows - 1) * 10) / rows);
      const gap = 10;
      const totalW = cols * cardW + (cols - 1) * gap;
      const startX = (w - totalW) / 2;

      tierMaps.forEach(({ lv, i }, idx) => {
        const col = idx % cols;
        const row = Math.floor(idx / cols);
        const x = startX + col * (cardW + gap);
        const y = this.cardsStartY + row * (cardH + gap);
        this.mapCards.push(this.makeMapCard(x, y, cardW, cardH, lv, i));
      });
    }

    makeMapCard(x, y, cw, ch, level, mapIndex) {
      const container = this.add.container(x, y);

      // Background card
      const bg = this.add.graphics();
      container.add(bg);

      // Mini terrain thumbnail
      const thumbY = 4;
      const thumbH = ch * 0.55;
      const thumbX = 4;
      const thumbW = cw - 8;
      const thumb = this.add.graphics();
      this.drawThumbnail(thumb, thumbX, thumbY, thumbW, thumbH, level);
      container.add(thumb);

      // Name
      const nameY = thumbY + thumbH + 4;
      const text = this.add.text(cw / 2, nameY, level.name, {
        font: 'bold 11px sans-serif',
        color: '#ffffff',
        align: 'center',
        wordWrap: { width: cw - 12 }
      }).setOrigin(0.5, 0);
      container.add(text);

      // Best time
      const best = Player.getBest(mapIndex);
      const bestStr = best !== null ? '★ ' + best.toFixed(2) + 's' : '★ —';
      const bestText = this.add.text(cw / 2, ch - 12, bestStr, {
        font: 'bold 10px monospace',
        color: best !== null ? '#ffaa66' : '#666'
      }).setOrigin(0.5, 0);
      container.add(bestText);

      // Order badge
      const orderBadge = this.add.text(6, 4, '', {
        font: 'bold 14px sans-serif',
        color: '#ffdd44',
        stroke: '#000', strokeThickness: 2
      });
      container.add(orderBadge);

      const hit = new Phaser.Geom.Rectangle(0, 0, cw, ch);
      container.setSize(cw, ch);
      container.setInteractive(hit, Phaser.Geom.Rectangle.Contains);
      container.on('pointerdown', () => this.toggleMap(mapIndex));
      container.on('pointerover', () => container.setAlpha(0.85));
      container.on('pointerout', () => container.setAlpha(1));

      return { container, bg, orderBadge, mapIndex, w: cw, h: ch };
    }

    drawThumbnail(g, x, y, w, h, level) {
      const points = level.terrain;
      if (!points || points.length === 0) return;

      // Compute bounds
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const p of points) {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
      }
      const padding = 3;
      const availW = w - padding * 2;
      const availH = h - padding * 2;
      const rangeX = (maxX - minX) || 1;
      const rangeY = (maxY - minY) || 1;
      const scale = Math.min(availW / rangeX, availH / rangeY);
      const offsetX = x + padding + (availW - rangeX * scale) / 2;
      const offsetY = y + padding + (availH - rangeY * scale) / 2;

      // Sky background
      g.fillStyle(0x4a6580, 1);
      g.fillRoundedRect(x, y, w, h, 4);

      // Terrain (per-segment wedge to bottom of thumbnail)
      g.fillStyle(0x6a4a30);
      const bottom = y + h - 1;
      for (let i = 0; i < points.length - 1; i++) {
        const p1 = points[i];
        if (p1.gap) continue;
        const p2 = points[i + 1];
        const x1 = offsetX + (p1.x - minX) * scale;
        const y1 = offsetY + (p1.y - minY) * scale;
        const x2 = offsetX + (p2.x - minX) * scale;
        const y2 = offsetY + (p2.y - minY) * scale;
        g.beginPath();
        g.moveTo(x1, y1);
        g.lineTo(x2, y2);
        g.lineTo(x2, bottom);
        g.lineTo(x1, bottom);
        g.closePath();
        g.fillPath();
      }

      // Top line in green
      g.lineStyle(1.5, 0x66cc55);
      let lineStarted = false;
      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        const cx = offsetX + (p.x - minX) * scale;
        const cy = offsetY + (p.y - minY) * scale;
        if (!lineStarted) {
          g.beginPath();
          g.moveTo(cx, cy);
          lineStarted = true;
        } else {
          g.lineTo(cx, cy);
        }
        if (p.gap) {
          g.strokePath();
          lineStarted = false;
        }
      }
      if (lineStarted) g.strokePath();

      // Finish flag (small yellow vertical line)
      if (level.finishX !== undefined) {
        const lastPt = points[points.length - 1];
        const fx = offsetX + (level.finishX - minX) * scale;
        const fy = offsetY + (lastPt.y - minY) * scale;
        g.lineStyle(1.5, 0xffdd44);
        g.lineBetween(fx, fy - 6, fx, fy);
      }
    }

    toggleMap(mapIndex) {
      const idx = this.selectedMaps.indexOf(mapIndex);
      if (idx >= 0) {
        this.selectedMaps.splice(idx, 1);
      } else {
        if (this.selectedMaps.length >= 3) return;
        this.selectedMaps.push(mapIndex);
      }
      this.refreshUI();
    }

    refreshUI() {
      // Cartes maps
      this.mapCards.forEach(card => {
        const order = this.selectedMaps.indexOf(card.mapIndex);
        card.bg.clear();
        if (order >= 0) {
          card.bg.fillStyle(0xff5533, 0.85);
          card.bg.fillRoundedRect(0, 0, card.w, card.h, 10);
          card.bg.lineStyle(2, 0xffdd44, 1);
          card.bg.strokeRoundedRect(0, 0, card.w, card.h, 10);
          card.orderBadge.setText('#' + (order + 1));
        } else {
          card.bg.fillStyle(0x222a3a, 0.9);
          card.bg.fillRoundedRect(0, 0, card.w, card.h, 10);
          card.bg.lineStyle(1, 0x444a5a, 1);
          card.bg.strokeRoundedRect(0, 0, card.w, card.h, 10);
          card.orderBadge.setText('');
        }
      });

      // Tier tabs (highlight le tier actif)
      if (this.tierTabs) {
        this.tierTabs.forEach(({ btn, tier }) => {
          if (tier === this.currentTier) {
            btn.setStyle({ backgroundColor: '#ff5533', color: '#fff' });
          } else {
            btn.setStyle({ backgroundColor: '#222a3a', color: '#ccc' });
          }
        });
      }

      // Boutons durée
      this.durationButtons.forEach(({ btn, val }) => {
        if (val === this.duration) {
          btn.setStyle({ backgroundColor: '#ff5533', color: '#fff' });
        } else {
          btn.setStyle({ backgroundColor: '#222a3a', color: '#aaa' });
        }
      });

      // Compteur
      const n = this.selectedMaps.length;
      const bo = n === 0 ? '—' : (n === 1 ? 'BO1 (1 map)' : (n === 2 ? 'BO2 (2 maps)' : 'BO3 (3 maps)'));
      this.counterText.setText(`${n} / 3 maps · ${bo}`);

      // GO button
      if (n === 0) {
        this.goBtn.setStyle({ backgroundColor: '#333', color: '#777' });
      } else {
        this.goBtn.setStyle({ backgroundColor: '#ff5533', color: '#ffffff' });
      }
    }

    startGame() {
      if (this.selectedMaps.length === 0) return;

      const sharedData = {
        level: this.selectedMaps[0],
        mapSequence: [...this.selectedMaps],
        durationPerMap: this.duration,
        currentMapIdx: 0,
        results: []
      };

      if (this.multiMode) {
        const challengeEndAt = Date.now() + 3000 + this.duration * 1000;
        try {
          this.conn.send({
            type: 'start',
            mapSequence: this.selectedMaps,
            durationPerMap: this.duration,
            currentMapIdx: 0,
            pseudo: Player.getName() || '?',
            challengeEndAt
          });
        } catch (e) {}
        this.scene.start('Game', {
          ...sharedData,
          mode: 'multi-host',
          conn: this.conn,
          peer: this.peer,
          challengeEndAt,
          peerPseudo: this.peerPseudo
        });
      } else {
        this.scene.start('Game', {
          ...sharedData,
          mode: 'solo'
        });
      }
    }
  }

  class MultiScene extends Phaser.Scene {
    constructor() { super('Multi'); }

    create() {
      const w = this.scale.width;
      const h = this.scale.height;
      this.cameras.main.setBackgroundColor('#1a2030');

      this.add.text(w/2, 80, 'MULTI EN LIGNE', {
        font: 'bold 40px sans-serif', color: '#ff5533',
        stroke: '#000', strokeThickness: 4
      }).setOrigin(0.5);

      this.add.text(w/2, 130, 'fais la course contre tes potes — pas de serveur, juste un lien à partager', {
        font: '14px sans-serif', color: '#aaaaaa'
      }).setOrigin(0.5);

      this.peer = null;
      this.conn = null;
      this.isHost = false;
      this.myId = null;

      this.showOverlay('start');

      const back = this.add.text(w/2, h - 60, '← MENU', {
        font: 'bold 18px sans-serif',
        color: '#ffffff', backgroundColor: '#444',
        padding: { x: 16, y: 8 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      back.on('pointerdown', () => {
        this.cleanup();
        this.scene.start('Menu');
      });

      this.events.on('shutdown', () => this.cleanupOverlay());
    }

    cleanup() {
      this.cleanupOverlay();
      if (this.peer && !this.peer.destroyed) {
        try { this.peer.destroy(); } catch (e) {}
      }
      this.peer = null;
      this.conn = null;
    }

    cleanupOverlay() {
      const overlay = document.getElementById('peerOverlay');
      overlay.style.display = 'none';
      overlay.innerHTML = '';
    }

    showOverlay(state) {
      const overlay = document.getElementById('peerOverlay');
      overlay.style.display = 'block';

      if (state === 'start') {
        overlay.innerHTML = `
          <h2>Multi en ligne</h2>
          <p>Crée une partie et envoie le code à ton pote, ou rejoins-le avec son code.</p>
          <div style="margin-top:18px">
            <button id="hostBtn">Créer une partie</button>
            <button id="joinBtn" class="secondary">Rejoindre</button>
          </div>
        `;
        document.getElementById('hostBtn').onclick = () => this.startHost();
        document.getElementById('joinBtn').onclick = () => this.showOverlay('join');

      } else if (state === 'host-init') {
        overlay.innerHTML = `
          <h2>Création de la partie...</h2>
          <p class="status">connexion au réseau pair-à-pair</p>
        `;

      } else if (state === 'host-waiting') {
        overlay.innerHTML = `
          <h2>Code de la partie</h2>
          <p>Envoie ce code à ton pote :</p>
          <div class="id-display">${this.myId}</div>
          <button class="copy-btn" id="copyBtn">Copier le code</button>
          <p class="status">en attente du pote...</p>
          <button class="secondary" id="cancelBtn">Annuler</button>
        `;
        document.getElementById('copyBtn').onclick = async () => {
          try {
            await navigator.clipboard.writeText(this.myId);
            document.getElementById('copyBtn').textContent = 'Copié !';
          } catch (e) {}
        };
        document.getElementById('cancelBtn').onclick = () => {
          this.cleanup();
          this.scene.start('Menu');
        };

      } else if (state === 'join') {
        overlay.innerHTML = `
          <h2>Rejoindre une partie</h2>
          <p>Colle le code reçu :</p>
          <input type="text" id="remoteId" placeholder="code du pote" autocomplete="off" />
          <div style="margin-top:8px">
            <button id="connectBtn">Se connecter</button>
            <button class="secondary" id="backBtn">Retour</button>
          </div>
          <p class="status" id="joinStatus"></p>
        `;
        const input = document.getElementById('remoteId');
        input.focus();
        const connect = () => {
          const id = input.value.trim();
          if (id) this.startJoin(id);
        };
        document.getElementById('connectBtn').onclick = connect;
        input.onkeydown = (e) => { if (e.key === 'Enter') connect(); };
        document.getElementById('backBtn').onclick = () => this.showOverlay('start');

      } else if (state === 'connecting') {
        overlay.innerHTML = `
          <h2>Connexion...</h2>
          <p class="status" id="status">connexion au pote en cours</p>
        `;

      } else if (state === 'connected') {
        const role = this.isHost ? 'Tu es l\'hôte' : 'Connecté à l\'hôte';
        overlay.innerHTML = `
          <h2>Connecté !</h2>
          <p>${role}.</p>
          ${this.isHost ? `
            <p>Configure la partie : choisis 1 à 3 maps + la durée par map.</p>
            <div style="margin-top:14px"><button id="goSetupBtn">Configurer la partie</button></div>
          ` : '<p class="status">⏳ en attente que l\'hôte configure la partie...</p>'}
        `;
        if (this.isHost) {
          document.getElementById('goSetupBtn').onclick = () => {
            this.cleanupOverlay();
            this.scene.start('GameSetup', {
              multiMode: true,
              conn: this.conn,
              peer: this.peer,
              peerPseudo: null
            });
          };
        }
      }
    }

    setStatus(text, isError) {
      const el = document.querySelector('#peerOverlay .status') || document.getElementById('status') || document.getElementById('joinStatus');
      if (el) {
        el.textContent = text;
        el.classList.toggle('error', !!isError);
      }
    }

    startHost() {
      this.isHost = true;
      this.showOverlay('host-init');
      this.peer = new Peer();

      this.peer.on('open', (id) => {
        this.myId = id;
        this.showOverlay('host-waiting');
      });

      this.peer.on('connection', (conn) => {
        this.conn = conn;
        conn.on('open', () => {
          this.showOverlay('connected');
        });
        conn.on('data', (data) => this.handleData(data));
        conn.on('close', () => this.setStatus('Pote déconnecté', true));
      });

      this.peer.on('error', (err) => {
        this.setStatus('Erreur : ' + err.type, true);
      });
    }

    startJoin(remoteId) {
      this.isHost = false;
      this.showOverlay('connecting');
      this.peer = new Peer();

      this.peer.on('open', () => {
        this.conn = this.peer.connect(remoteId, { reliable: true });
        this.conn.on('open', () => {
          this.showOverlay('connected');
        });
        this.conn.on('data', (data) => this.handleData(data));
        this.conn.on('error', (err) => this.setStatus('Erreur : ' + err, true));
        this.conn.on('close', () => this.setStatus('Connexion fermée', true));

        // timeout si on n'arrive pas à se connecter
        setTimeout(() => {
          if (this.conn && !this.conn.open) {
            this.setStatus('Connexion impossible — vérifie le code', true);
          }
        }, 8000);
      });

      this.peer.on('error', (err) => {
        this.setStatus('Erreur : ' + err.type, true);
      });
    }

    handleData(data) {
      if (data.type === 'start') {
        const seq = data.mapSequence || [data.level];
        this.startRace({
          level: seq[0],
          mapSequence: seq,
          durationPerMap: data.durationPerMap || 300,
          currentMapIdx: data.currentMapIdx || 0,
          challengeEndAt: data.challengeEndAt,
          peerPseudo: data.pseudo
        });
      }
    }

    startRace(opts) {
      this.cleanupOverlay();
      this.scene.start('Game', {
        level: opts.level,
        mode: this.isHost ? 'multi-host' : 'multi-join',
        conn: this.conn,
        peer: this.peer,
        challengeEndAt: opts.challengeEndAt,
        peerPseudo: opts.peerPseudo,
        mapSequence: opts.mapSequence,
        durationPerMap: opts.durationPerMap,
        currentMapIdx: opts.currentMapIdx,
        results: []
      });
    }
  }
