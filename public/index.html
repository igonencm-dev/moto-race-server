      }).setInteractive({ useHandCursor: true });
      back.on('pointerdown', () => {
        ServerConn.disconnect();
        this.scene.start('Menu');
      });

      // URL serveur
      const currentUrl = ServerConn.getUrl();
      this.add.text(w / 2, h - 110, 'serveur : ' + currentUrl, {
        font: '11px monospace',
        color: '#666'
      }).setOrigin(0.5);

      const editUrl = this.add.text(w / 2, h - 88, 'changer l\'URL du serveur', {
        font: '11px sans-serif',
        color: '#888',
        backgroundColor: '#222a3a',
        padding: { x: 8, y: 4 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      editUrl.on('pointerdown', () => this.promptUrl());

      this.statusText = this.add.text(w / 2, h / 2, 'connexion au serveur...', {
        font: 'bold 22px sans-serif',
        color: '#fff'
      }).setOrigin(0.5);

      this.detailText = this.add.text(w / 2, h / 2 + 40, '', {
        font: '14px sans-serif',
        color: '#aaa'
      }).setOrigin(0.5);

      // Connexion
      if (!Player.getName()) {
        this.statusText.setText('définis ton pseudo d\'abord');
        showPseudoOverlay(() => this.tryConnect());
      } else {
        this.tryConnect();
      }
    }

    tryConnect() {
      const pseudo = Player.getName() || 'anonyme';
      this.statusText.setText('connexion à ' + ServerConn.getUrl() + ' ...');
      this.detailText.setText('');
      ServerConn.connect(pseudo, 'main')
        .then((state) => this.onJoined(state))
        .catch((err) => {
          this.statusText.setText('❌ connexion échouée');
          this.detailText.setText(
            'serveur indisponible. Vérifie que le serveur tourne ' +
            '(node server.js) ou que l\'URL est correcte.\n' +
            (err && err.message ? err.message : '')
          );
          // Retry button
          if (!this.retryBtn) {
            this.retryBtn = this.add.text(this.scale.width / 2, this.scale.height / 2 + 110, 'Réessayer', {
              font: 'bold 18px sans-serif',
              color: '#fff',
              backgroundColor: '#ff5533',
              padding: { x: 22, y: 10 }
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });
            this.retryBtn.on('pointerdown', () => {
              this.retryBtn.destroy();
              this.retryBtn = null;
              this.tryConnect();
            });
          }
        });
    }

    onJoined(state) {
      // On lance directement GameScene en mode 'server'.
      // GameScene gère l'écoute des events serveur.
      this.scene.start('Game', {
        level: state.currentMapIdx,
        mode: 'server',
        currentMapIdx: state.currentMapIdx,
        mapStartedAt: state.mapStartedAt,
        mapDuration: state.mapDuration,
        inTransition: state.inTransition,
        transitionEndsAt: state.transitionEndsAt,
        existingPlayers: state.players || []
      });
    }

    promptUrl() {
      const overlay = document.getElementById('peerOverlay');
      overlay.style.display = 'block';
      const cur = ServerConn.getUrl();
      overlay.innerHTML = `
        <h2>URL du serveur</h2>
        <p>Saisis l'URL de ton serveur Moto Race (WebSocket).</p>
        <input type="text" id="urlInput" placeholder="ws://localhost:3000" value="${cur}" />
        <p style="font-size:11px;opacity:0.7">Local : <code>ws://localhost:3000</code><br>Déployé : <code>wss://ton-app.up.railway.app</code> (https → wss)</p>
        <div style="margin-top:8px">
          <button id="urlOk">Valider</button>
          <button class="secondary" id="urlCancel">Annuler</button>
        </div>
      `;
      const input = document.getElementById('urlInput');
      input.focus();
      input.select();
      document.getElementById('urlOk').onclick = () => {
        const v = input.value.trim();
        if (v) {
          ServerConn.setUrl(v);
          overlay.style.display = 'none';
          this.scene.restart();
        }
      };
      document.getElementById('urlCancel').onclick = () => {
        overlay.style.display = 'none';
      };
    }
  }

  // ===========================================================
  // SALON PRIVÉ — création / rejoindre / lobby (N joueurs)
  // ===========================================================
  class PrivateRoomScene extends Phaser.Scene {
    constructor() { super('PrivateRoom'); }

    init(data) {
      this.initData = data || {};
    }

    create() {
      this.state = 'entry';
      this.selectedMaps = [];
      this.duration = 180;
      this.currentTier = 1;
      this.lobbyPlayers = [];
      this.isHost = false;
      this.roomCode = null;
      this.serverListeners = {};

      // Mode "retour au lobby" : on saute l'entry et on va direct au lobby
      // (la WebSocket ServerConn est encore connectée depuis le BO précédent)
      if (this.initData.returnToLobby) {
        this.roomCode = this.initData.roomCode;
        this.lobbyMapSequence = this.initData.mapSequence;
        this.lobbyDuration = this.initData.durationPerMap;
        this.lobbyPlayers = (this.initData.players || []).slice();
        this.isHost = (this.initData.hostId === ServerConn.myId);
        this.attachServerListeners();
        this.renderLobby();
        return;
      }

      if (!Player.getName()) {
        showPseudoOverlay(() => this.renderEntry());
      } else {
        this.renderEntry();
      }
    }

    clear() {
      this.children.removeAll();
    }

    drawHeader(title, subtitle) {
      const w = this.scale.width;
      this.cameras.main.setBackgroundColor('#1a2030');
      this.add.text(w / 2, 60, title, {
        font: 'bold 38px sans-serif',
        color: '#ff5533', stroke: '#000', strokeThickness: 4
      }).setOrigin(0.5);
      if (subtitle) {
        this.add.text(w / 2, 100, subtitle, {
          font: '14px sans-serif', color: '#aaa'
        }).setOrigin(0.5);
      }
      // Bouton retour
      const back = this.add.text(20, 20, '← Menu', {
        font: 'bold 14px sans-serif', color: '#aaa',
        backgroundColor: '#333', padding: { x: 14, y: 8 }
      }).setInteractive({ useHandCursor: true });
      back.on('pointerdown', () => {
        this.cleanupServerListeners();
        ServerConn.disconnect();
        this.scene.start('Menu');
      });
      // Pseudo
      const pseudo = Player.getName();
      if (pseudo) {
        this.add.text(w - 20, 24, '👤 ' + pseudo, {
          font: 'bold 14px sans-serif', color: '#ffdd44',
          backgroundColor: '#222a3a', padding: { x: 12, y: 6 }
        }).setOrigin(1, 0);
      }
    }

    // ============== ENTRY : Créer ou Rejoindre ==============
    renderEntry() {
      this.clear();
      this.state = 'entry';
      this.drawHeader('🤝  SALON PRIVÉ', 'Joue avec plusieurs potes (jusqu\'à 8) — tour à tour sur les maps que TU choisis');
      const w = this.scale.width;
      const h = this.scale.height;

      const btnCreate = this.add.text(w / 2, h / 2 - 30, '➕  CRÉER UN SALON', {
        font: 'bold 22px sans-serif', color: '#fff',
        backgroundColor: '#ff5533', padding: { x: 30, y: 16 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      btnCreate.on('pointerdown', () => this.renderCreateConfig());

      const btnJoin = this.add.text(w / 2, h / 2 + 40, '🔗  REJOINDRE AVEC UN CODE', {
        font: 'bold 18px sans-serif', color: '#fff',
        backgroundColor: '#3366aa', padding: { x: 26, y: 14 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      btnJoin.on('pointerdown', () => this.promptJoinCode());

      this.add.text(w / 2, h / 2 + 110, 'Le créateur configure les maps et la durée. Le code à 4 lettres est partagé\navec les potes pour qu\'ils rejoignent.', {
        font: '12px sans-serif', color: '#888', align: 'center'
      }).setOrigin(0.5);
    }

    promptJoinCode() {
      const overlay = document.getElementById('peerOverlay');
      overlay.style.display = 'block';
      overlay.innerHTML = `
        <h2>Rejoindre un salon</h2>
        <p>Entre le code à 4 lettres communiqué par le créateur du salon.</p>
        <input type="text" id="codeInput" maxlength="4" placeholder="XXXX" style="text-transform:uppercase;font-size:24px;letter-spacing:8px;text-align:center" />
        <div id="codeError" style="color:#ff6655;font-size:12px;margin-top:6px;display:none"></div>
        <div style="margin-top:8px">
          <button id="codeOk">Rejoindre</button>
          <button class="secondary" id="codeCancel">Annuler</button>
        </div>
      `;
      const input = document.getElementById('codeInput');
      input.focus();
      const errorEl = document.getElementById('codeError');
      const showError = (txt) => { errorEl.textContent = txt; errorEl.style.display = 'block'; };
      const submit = () => {
        const code = input.value.trim().toUpperCase().slice(0, 4);
        if (code.length !== 4) { showError('Le code doit faire 4 lettres'); return; }
        overlay.style.display = 'none';
        this.tryJoinRoom(code);
      };
      document.getElementById('codeOk').onclick = submit;
      document.getElementById('codeCancel').onclick = () => { overlay.style.display = 'none'; };
      input.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
    }

    tryJoinRoom(code) {
      this.clear();
      this.drawHeader('🤝  SALON PRIVÉ', 'connexion en cours...');
      const w = this.scale.width;
      const h = this.scale.height;
      this.add.text(w / 2, h / 2, `Rejoindre ${code}...`, {
        font: 'bold 20px sans-serif', color: '#fff'
      }).setOrigin(0.5);

      const pseudo = Player.getName() || 'anonyme';
      ServerConn.connect(pseudo, 'main')
        .catch(() => null) // ignore l'auto-join sur main
        .finally(() => {
          // En réalité on ouvre une connexion brute pour envoyer joinRoom au lieu de join
          // Plus simple : on (re)connecte directement avec un message custom
          this.openCustomConnection(() => {
            ServerConn.send({ type: 'joinRoom', code, pseudo });
          });
        });

      this.attachServerListeners();
    }

    // Ouvre/réouvre une connexion mais sans envoyer 'join' automatique
    openCustomConnection(onOpen) {
      // Si déjà connecté, on déconnecte d'abord pour éviter le auto-join
      if (ServerConn.connected) ServerConn.disconnect();
      try {
        ServerConn.ws = new WebSocket(ServerConn.getUrl());
      } catch (e) {
        this.showJoinError('serveur inaccessible');
        return;
      }
      ServerConn.ws.onopen = () => {
        ServerConn.connected = true;
        onOpen();
      };
      ServerConn.ws.onmessage = (evt) => {
        let m;
        try { m = JSON.parse(evt.data); } catch (e) { return; }
        if (m.type === 'roomCreated' || m.type === 'roomJoined') {
          ServerConn.myId = m.myId;
        }
        ServerConn.emit(m.type, m);
      };
      ServerConn.ws.onclose = () => { ServerConn.connected = false; ServerConn.emit('close'); };
      ServerConn.ws.onerror = (err) => { ServerConn.emit('error', err); };
    }

    showJoinError(message) {
      this.clear();
      this.drawHeader('🤝  SALON PRIVÉ', '');
      const w = this.scale.width;
      const h = this.scale.height;
      this.add.text(w / 2, h / 2 - 20, '❌  ' + message, {
        font: 'bold 22px sans-serif', color: '#ff6655'
      }).setOrigin(0.5);
      const btn = this.add.text(w / 2, h / 2 + 40, 'Retour', {
        font: 'bold 16px sans-serif', color: '#fff',
        backgroundColor: '#ff5533', padding: { x: 22, y: 10 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      btn.on('pointerdown', () => this.renderEntry());
    }

    // ============== CREATE CONFIG : choix maps + durée ==============
    renderCreateConfig() {
      this.clear();
      this.state = 'createConfig';
      this.drawHeader('CONFIGURATION DU SALON', 'Choisis 1 à 5 maps + la durée par map');
      const w = this.scale.width;
      const h = this.scale.height;

      // Tabs niveau 1/2
      this.tierTabs = [];
      const tiers = [1, 2];
      tiers.forEach((tier, idx) => {
        const x = w / 2 + (idx - 0.5) * 160;
        const tab = this.add.text(x, 130, `🏆  NIVEAU ${tier}`, {
          font: 'bold 14px sans-serif', color: '#ccc',
          backgroundColor: '#222a3a', padding: { x: 18, y: 8 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        tab.on('pointerdown', () => { this.currentTier = tier; this.refreshConfigUI(); });
        this.tierTabs.push({ btn: tab, tier });
      });

      // Durée
      this.add.text(w / 2, 170, 'DURÉE PAR MAP', {
        font: 'bold 11px sans-serif', color: '#ffaa66'
      }).setOrigin(0.5);
      this.durationButtons = [];
      [
        { label: '1 min', val: 60 },
        { label: '3 min', val: 180 },
        { label: '5 min', val: 300 }
      ].forEach((opt, idx) => {
        const x = w / 2 + (idx - 1) * 100;
        const btn = this.add.text(x, 196, opt.label, {
          font: 'bold 14px sans-serif', color: '#aaa',
          backgroundColor: '#222a3a', padding: { x: 16, y: 6 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        btn.on('pointerdown', () => { this.duration = opt.val; this.refreshConfigUI(); });
        this.durationButtons.push({ btn, val: opt.val });
      });

      this.counterText = this.add.text(w / 2, 228, '0 / 5 maps sélectionnées', {
        font: 'bold 12px sans-serif', color: '#aaa'
      }).setOrigin(0.5);

      // Grille de maps
      this.cardsContainer = this.add.container(0, 0);
      this.refreshConfigUI();

      // Bouton créer
      this.createBtn = this.add.text(w / 2, h - 50, 'CRÉER LE SALON', {
        font: 'bold 18px sans-serif', color: '#fff',
        backgroundColor: '#666', padding: { x: 30, y: 12 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      this.createBtn.on('pointerdown', () => {
        if (!this.selectedMaps.length) return;
        this.tryCreateRoom();
      });

      this.refreshConfigUI();
    }

    refreshConfigUI() {
      // Tabs
      if (this.tierTabs) {
        this.tierTabs.forEach(t => {
          t.btn.setStyle({
            color: t.tier === this.currentTier ? '#ffdd44' : '#ccc',
            backgroundColor: t.tier === this.currentTier ? '#3a2a1a' : '#222a3a'
          });
        });
      }
      // Duration
      if (this.durationButtons) {
        this.durationButtons.forEach(d => {
          d.btn.setStyle({
            color: d.val === this.duration ? '#000' : '#aaa',
            backgroundColor: d.val === this.duration ? '#ffdd44' : '#222a3a'
          });
        });
      }
      // Compteur
      if (this.counterText) {
        this.counterText.setText(`${this.selectedMaps.length} / 5 maps sélectionnées`);
      }
      // Bouton créer
      if (this.createBtn) {
        const enabled = this.selectedMaps.length > 0;
        this.createBtn.setStyle({
          backgroundColor: enabled ? '#ff5533' : '#666',
          color: '#fff'
        });
      }
      // Grille
      this.renderConfigGrid();
    }

    renderConfigGrid() {
      if (!this.cardsContainer) return;
      this.cardsContainer.removeAll(true);
      const w = this.scale.width;
      const startY = 270;
      const cardW = 130, cardH = 78;
      const gap = 12;
      const cols = Math.min(5, Math.max(3, Math.floor((w - 60) / (cardW + gap))));
      const filtered = LEVELS.map((l, i) => ({ l, i })).filter(x => (x.l.tier || 1) === this.currentTier);
      filtered.forEach((x, idx) => {
        const col = idx % cols;
        const row = Math.floor(idx / cols);
        const cx = w / 2 + (col - (cols - 1) / 2) * (cardW + gap);
        const cy = startY + row * (cardH + gap);
        const isSelected = this.selectedMaps.includes(x.i);
        const card = this.add.rectangle(cx, cy, cardW, cardH, isSelected ? 0xff5533 : 0x222a3a)
          .setStrokeStyle(2, isSelected ? 0xffdd44 : 0x444444)
          .setInteractive({ useHandCursor: true });
        const num = isSelected ? `#${this.selectedMaps.indexOf(x.i) + 1}` : '';
        const label = this.add.text(cx, cy - 18, num + ' ' + x.l.name, {
          font: 'bold 11px sans-serif', color: '#fff', wordWrap: { width: cardW - 8 }, align: 'center'
        }).setOrigin(0.5);
        const tier = this.add.text(cx, cy + 16, `T${x.l.tier || 1}`, {
          font: '10px sans-serif', color: '#aaa'
        }).setOrigin(0.5);
        card.on('pointerdown', () => {
          if (isSelected) {
            this.selectedMaps = this.selectedMaps.filter(idx2 => idx2 !== x.i);
          } else if (this.selectedMaps.length < 5) {
            this.selectedMaps.push(x.i);
          }
          this.refreshConfigUI();
        });
        this.cardsContainer.add([card, label, tier]);
      });
    }

    tryCreateRoom() {
      this.clear();
      this.drawHeader('🤝  SALON PRIVÉ', 'création du salon...');
      const w = this.scale.width;
      const h = this.scale.height;
      this.add.text(w / 2, h / 2, 'Création...', {
        font: 'bold 20px sans-serif', color: '#fff'
      }).setOrigin(0.5);

      const pseudo = Player.getName() || 'anonyme';
      this.openCustomConnection(() => {
        ServerConn.send({
          type: 'createRoom',
          pseudo,
          mapSequence: this.selectedMaps.slice(),
          durationPerMap: this.duration
        });
      });
      this.attachServerListeners();
    }

    // ============== LOBBY ==============
    renderLobby() {
      this.clear();
      this.state = 'lobby';
      this.drawHeader('🤝  LOBBY  ' + (this.roomCode ? this.roomCode : ''), 'Partage le code avec tes potes pour qu\'ils rejoignent');
      const w = this.scale.width;
      const h = this.scale.height;

      // Code en gros
      this.add.text(w / 2, 165, 'CODE :', {
        font: 'bold 12px sans-serif', color: '#aaa'
      }).setOrigin(0.5);
      this.add.text(w / 2, 200, this.roomCode || '----', {
        font: 'bold 56px monospace', color: '#ffdd44',
        backgroundColor: '#222a3a', padding: { x: 24, y: 8 },
        stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5);
      // Bouton copier
      const copy = this.add.text(w / 2, 250, '📋  Copier le code', {
        font: 'bold 12px sans-serif', color: '#aaa',
        backgroundColor: '#333', padding: { x: 12, y: 6 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      copy.on('pointerdown', () => {
        if (this.roomCode) {
          navigator.clipboard.writeText(this.roomCode).catch(() => {});
          copy.setText('✓  Copié !');
          this.time.delayedCall(1500, () => copy.setText('📋  Copier le code'));
        }
      });

      // Maps choisies (récap)
      const recapY = 285;
      this.add.text(w / 2, recapY, 'BO de ' + (this.lobbyMapSequence ? this.lobbyMapSequence.length : '?') + ' map(s)  ·  ' + (this.lobbyDuration || '?') + 's par map', {
        font: 'bold 12px sans-serif', color: '#ffaa66'
      }).setOrigin(0.5);
      if (this.lobbyMapSequence) {
        const seqStr = this.lobbyMapSequence.map((idx, i) => `${i + 1}. ${LEVELS[idx].name}`).join('  ·  ');
        this.add.text(w / 2, recapY + 22, seqStr, {
          font: '11px sans-serif', color: '#aaa', wordWrap: { width: w - 60 }, align: 'center'
        }).setOrigin(0.5);
      }

      // Liste joueurs
      this.lobbyPlayersGroup = this.add.group();
      this.refreshLobbyPlayers();

      // Bouton "Lancer" pour le host, "En attente" pour les autres
      this.lobbyActionY = h - 80;
      this.refreshLobbyAction();
    }

    refreshLobbyPlayers() {
      if (this.lobbyPlayersGroup) this.lobbyPlayersGroup.clear(true, true);
      const w = this.scale.width;
      const startY = 360;
      this.add.text(w / 2, startY, `JOUEURS  (${this.lobbyPlayers.length})`, {
        font: 'bold 12px sans-serif', color: '#ffaa66'
      }).setOrigin(0.5).setName('lobbyPlayersHeader');
      this.lobbyPlayers.forEach((p, i) => {
        const row = i;
        const isMe = p.id === ServerConn.myId;
        const txt = `${p.isHost ? '👑 ' : ''}${p.pseudo}${isMe ? ' (toi)' : ''}`;
        const t = this.add.text(w / 2, startY + 30 + row * 26, txt, {
          font: 'bold 16px sans-serif',
          color: isMe ? '#ffdd44' : '#fff'
        }).setOrigin(0.5);
        this.lobbyPlayersGroup.add(t);
      });
    }

    refreshLobbyAction() {
      if (this.lobbyActionBtn) { this.lobbyActionBtn.destroy(); this.lobbyActionBtn = null; }
      if (this.lobbyActionLabel) { this.lobbyActionLabel.destroy(); this.lobbyActionLabel = null; }
      if (this.lobbyEditBtn) { this.lobbyEditBtn.destroy(); this.lobbyEditBtn = null; }
      const w = this.scale.width;
      if (this.isHost) {
        const enabled = this.lobbyPlayers.length >= 1;
        this.lobbyActionBtn = this.add.text(w / 2, this.lobbyActionY, '🏁  LANCER LE BO', {
          font: 'bold 22px sans-serif', color: '#fff',
          backgroundColor: enabled ? '#44aa44' : '#666',
          padding: { x: 30, y: 14 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        this.lobbyActionBtn.on('pointerdown', () => {
          if (this.lobbyPlayers.length >= 1) {
            ServerConn.send({ type: 'startBO' });
          }
        });
        // Bouton modifier la config (uniquement host)
        this.lobbyEditBtn = this.add.text(w / 2, this.lobbyActionY - 50, '⚙  Modifier maps / durée', {
          font: 'bold 13px sans-serif', color: '#ffaa66',
          backgroundColor: '#333', padding: { x: 14, y: 8 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        this.lobbyEditBtn.on('pointerdown', () => this.renderEditConfig());
      } else {
        this.lobbyActionLabel = this.add.text(w / 2, this.lobbyActionY, '⏳  En attente du host pour lancer la course...', {
          font: 'bold 16px sans-serif', color: '#aaa'
        }).setOrigin(0.5);
      }
    }

    // Modifie la config maps/durée depuis le lobby (host)
    renderEditConfig() {
      this.clear();
      this.state = 'editConfig';
      this.drawHeader('⚙  MODIFIER LE SALON', 'Choisis 1 à 5 maps + la durée par map');
      const w = this.scale.width;
      const h = this.scale.height;

      // Pré-remplit avec la config courante
      this.selectedMaps = (this.lobbyMapSequence || []).slice();
      this.duration = this.lobbyDuration || 180;
      this.currentTier = 1;

      // Tabs niveau 1/2
      this.tierTabs = [];
      [1, 2].forEach((tier, idx) => {
        const x = w / 2 + (idx - 0.5) * 160;
        const tab = this.add.text(x, 130, `🏆  NIVEAU ${tier}`, {
          font: 'bold 14px sans-serif', color: '#ccc',
          backgroundColor: '#222a3a', padding: { x: 18, y: 8 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        tab.on('pointerdown', () => { this.currentTier = tier; this.refreshConfigUI(); });
        this.tierTabs.push({ btn: tab, tier });
      });

      this.add.text(w / 2, 170, 'DURÉE PAR MAP', {
        font: 'bold 11px sans-serif', color: '#ffaa66'
      }).setOrigin(0.5);
      this.durationButtons = [];
      [
        { label: '1 min', val: 60 },
        { label: '3 min', val: 180 },
        { label: '5 min', val: 300 }
      ].forEach((opt, idx) => {
        const x = w / 2 + (idx - 1) * 100;
        const btn = this.add.text(x, 196, opt.label, {
          font: 'bold 14px sans-serif', color: '#aaa',
          backgroundColor: '#222a3a', padding: { x: 16, y: 6 }
        }).setOrigin(0.5).setInteractive({ useHandCursor: true });
        btn.on('pointerdown', () => { this.duration = opt.val; this.refreshConfigUI(); });
        this.durationButtons.push({ btn, val: opt.val });
      });

      this.counterText = this.add.text(w / 2, 228, '0 / 5 maps sélectionnées', {
        font: 'bold 12px sans-serif', color: '#aaa'
      }).setOrigin(0.5);

      this.cardsContainer = this.add.container(0, 0);

      // Bouton sauvegarder
      this.createBtn = this.add.text(w / 2 - 100, h - 50, '💾  SAUVEGARDER', {
        font: 'bold 16px sans-serif', color: '#fff',
        backgroundColor: '#44aa44', padding: { x: 20, y: 10 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      this.createBtn.on('pointerdown', () => {
        if (!this.selectedMaps.length) return;
        ServerConn.send({
          type: 'updateConfig',
          mapSequence: this.selectedMaps.slice(),
          durationPerMap: this.duration
        });
        // Le retour au lobby se fait via configUpdated (broadcast serveur)
      });
      // Bouton annuler
      const cancelBtn = this.add.text(w / 2 + 100, h - 50, 'Annuler', {
        font: 'bold 14px sans-serif', color: '#fff',
        backgroundColor: '#666', padding: { x: 18, y: 10 }
      }).setOrigin(0.5).setInteractive({ useHandCursor: true });
      cancelBtn.on('pointerdown', () => this.renderLobby());

      this.refreshConfigUI();
    }

    // ============== ÉCOUTE DES MESSAGES SERVEUR ==============
    attachServerListeners() {
      this.cleanupServerListeners();
      const reg = (event, fn) => {
        ServerConn.on(event, fn);
        this.serverListeners[event] = fn;
      };
      reg('roomCreated', (m) => {
        this.roomCode = m.code;
        this.isHost = true;
        this.lobbyMapSequence = m.mapSequence;
        this.lobbyDuration = m.durationPerMap;
        this.lobbyPlayers = (m.players || []).slice();
        this.renderLobby();
      });
      reg('roomJoined', (m) => {
        this.roomCode = m.code;
        this.isHost = (m.myId === m.hostId);
        this.lobbyMapSequence = m.mapSequence;
        this.lobbyDuration = m.durationPerMap;
        this.lobbyPlayers = (m.players || []).slice();
        this.renderLobby();
      });
      reg('lobbyPlayerJoined', (m) => {
        if (this.state !== 'lobby') return;
        this.lobbyPlayers.push({ id: m.id, pseudo: m.pseudo, isHost: m.isHost });
        this.refreshLobbyPlayers();
        this.refreshLobbyAction();
      });
      reg('playerLeft', (m) => {
        this.lobbyPlayers = this.lobbyPlayers.filter(p => p.id !== m.id);
        if (this.state === 'lobby') {
          this.refreshLobbyPlayers();
          this.refreshLobbyAction();
        }
      });
      reg('hostChanged', (m) => {
        this.lobbyPlayers.forEach(p => p.isHost = (p.id === m.newHostId));
        this.isHost = (m.newHostId === ServerConn.myId);
        if (this.state === 'lobby') {
          this.refreshLobbyPlayers();
          this.refreshLobbyAction();
        }
      });
      reg('configUpdated', (m) => {
        // Le host vient de modifier la config : tout le monde voit le lobby rafraîchi
        this.lobbyMapSequence = m.mapSequence;
        this.lobbyDuration = m.durationPerMap;
        if (this.state === 'lobby' || this.state === 'editConfig') {
          this.renderLobby();
        }
      });
      reg('error', (m) => {
        const errMap = {
          'salon_introuvable': 'salon introuvable (code invalide)',
          'partie_en_cours': 'le BO est déjà lancé dans ce salon',
          'salon_plein': 'salon plein (max 8)',
          'config_invalide': 'configuration invalide'
        };
        const msg = (m && m.error && errMap[m.error]) || 'erreur serveur';
        this.showJoinError(msg);
      });
      reg('privateBOStart', (m) => {
        // Démarrage du BO : on transitionne vers GameScene en mode private-server
        this.cleanupServerListeners();
        this.scene.start('Game', {
          level: m.currentMapIdx,
          mode: 'private-server',
          mapSequence: m.mapSequence,
          durationPerMap: m.durationPerMap,
          currentMapIdx: 0,
          privateMapIdx: m.currentMapIdx,
          privateMapStartedAt: m.mapStartedAt,
          privateMapDuration: m.mapDuration,
          existingPlayers: this.lobbyPlayers.filter(p => p.id !== ServerConn.myId).map(p => ({
            id: p.id, pseudo: p.pseudo, sessionBest: null
          })),
          results: []
        });
      });
    }

    cleanupServerListeners() {
      Object.entries(this.serverListeners || {}).forEach(([event, fn]) => {
        try { ServerConn.off(event, fn); } catch (e) {}
      });
      this.serverListeners = {};
    }
  }

  // ===========================================================
  // SCÈNE JEU (la course)
  // ===========================================================
  class GameScene extends Phaser.Scene {
    constructor() { super('Game'); }

    init(data) {
      this.levelIndex = data.level || 0;
      this.mode = data.mode || 'solo';
      this.conn = data.conn || null;
      this.peer = data.peer || null;
      // État du challenge (préservé entre restarts d'une même map)
      this.challengeEndTime = data.challengeEndTime || null;
      this.sessionBestTime = data.sessionBestTime !== undefined ? data.sessionBestTime : null;
      this.runCount = data.runCount || 1;
      this.cachedTop = data.cachedTop || null;
      // Multi P2P : timestamp absolu (Date.now) pour synchroniser les 2 joueurs
      this.challengeEndAt = data.challengeEndAt || null;
      this.peerPseudo = data.peerPseudo || null;
      this.peerSessionBest = data.peerSessionBest !== undefined ? data.peerSessionBest : null;
      // Replay : meilleure run enregistrée (préservée entre restarts) - { time, frames, level, pseudo }
      this.bestRunReplay = data.bestRunReplay || null;
      this.peerBestReplay = data.peerBestReplay || null;
      // Séquence de maps (BO1/BO2/BO3)
      this.mapSequence = data.mapSequence || [this.levelIndex];
      this.durationPerMap = data.durationPerMap || 300;
      this.currentMapIdx = data.currentMapIdx !== undefined ? data.currentMapIdx : 0;
      this.results = data.results || [];
      // Mode SERVEUR : état partagé via WebSocket
      this.serverState = (data.mode === 'server') ? {
        mapStartedAt: data.mapStartedAt || Date.now(),
        mapDuration: data.mapDuration || 5 * 60 * 1000,
        inTransition: data.inTransition || false,
        transitionEndsAt: data.transitionEndsAt || null,
        existingPlayers: data.existingPlayers || []
      } : null;
      // Mode PRIVATE-SERVER : BO multi N joueurs piloté par le host
      this.privateState = (data.mode === 'private-server') ? {
        mapStartedAt: data.privateMapStartedAt || Date.now(),
        mapDuration: data.privateMapDuration || (data.durationPerMap || 180) * 1000,
        existingPlayers: data.existingPlayers || []
      } : null;
    }

    create() {
      const level = LEVELS[this.levelIndex];

      // Ciel
      this.cameras.main.setBackgroundColor('#87CEEB');

      // Décor d'arrière-plan parallaxé
      this.drawBackground();

      // Terrain (physique + visuel)
      this.terrainGfx = this.add.graphics();
      this.buildTerrain(level.terrain);

      // Obstacles
      this.obstaclesGfx = this.add.graphics();
      level.obstacles.forEach(o => this.addObstacle(o));

      // Plafonds : 2 formats supportés
      // - Ancien: [{x, y, w, h}, ...] — rectangles
      // - Nouveau: [{x, y}, ...] — contour organique (bord inférieur du plafond rocheux)
      this.ceilingsGfx = this.add.graphics();
      if (level.ceilings && level.ceilings.length > 0) {
        if (level.ceilings[0].w !== undefined) {
          level.ceilings.forEach(c => this.addCeiling(c));
        } else {
          this.buildCeilingPath(level.ceilings);
        }
      }

      // Boost pads (zones orange qui propulsent)
      this.boostPadGfx = this.add.graphics();
      (level.boostPads || []).forEach(bp => this.addBoostPad(bp));

      // Lava / hazards (crash instantané)
      this.hazardsGfx = this.add.graphics();
      this.hazardTime = 0;
      this.hazards = [];
      (level.hazards || []).forEach(h => this.addHazard(h));

      // Coins (collectibles → bonus -0.5s)
      this.coins = [];
      this.coinsGfx = this.add.graphics();
      (level.coins || []).forEach(c => this.addCoin(c));

      // Decor (éléments visuels : flèches, murs déco, rochers)
      this.decorGfx = this.add.graphics();
      (level.decor || []).forEach(d => this.drawDecor(d));

      // Ligne d'arrivée
      this.finishX = level.finishX;
      this.addFinishLine(level);

      // Moto du joueur
      const startX = 100;
      const startY = level.bikeStartY;
      this.bike = this.createBike(startX, startY);
      this.bikeGfx = this.add.graphics();

      // Ghost adverse en multi P2P (1v1)
      if (this.conn) {
        this.ghostState = { x: startX, y: startY, a: 0, wba: 0, wfa: 0, finished: false, crashed: false };
        this.ghostGfx = this.add.graphics();
        this.opponentFinishTime = null;
      }

      // Mode SERVEUR (public) ou PRIVATE-SERVER : plusieurs ghosts (un par joueur connecté)
      if (this.mode === 'server' || this.mode === 'private-server') {
        this.ghosts = new Map();
        this.ghostsGfx = this.add.graphics();
        const state = this.mode === 'server' ? this.serverState : this.privateState;
        if (state && state.existingPlayers) {
          for (const p of state.existingPlayers) {
            this.ghosts.set(p.id, {
              x: startX, y: startY, a: 0, wba: 0, wfa: 0,
              pseudo: p.pseudo, sessionBest: p.sessionBest,
              finished: false, crashed: false
            });
          }
        }
      }

      // Caméra qui suit la moto
      this.followTarget = this.add.zone(startX, startY, 1, 1);
      this.cameras.main.setBounds(-300, -1000, level.finishX + 700, 2200);
      this.cameras.main.startFollow(this.followTarget, false, 0.12, 0.1);

      // Inputs (flèches + ZQSD + WASD + ESPACE pour boost)
      this.cursors = this.input.keyboard.createCursorKeys();
      this.keyW = this.input.keyboard.addKey('W');
      this.keyA = this.input.keyboard.addKey('A');
      this.keyS = this.input.keyboard.addKey('S');
      this.keyD = this.input.keyboard.addKey('D');
      this.keyZ = this.input.keyboard.addKey('Z');
      this.keyQ = this.input.keyboard.addKey('Q');
      this.input.keyboard.on('keydown-SPACE', () => this.tryBoost());

      // État boost (1 utilisation par essai)
      this.boostUsed = false;
      this.boostActive = false;
      this.boostEndsAt = 0;
      this.input.keyboard.on('keydown-R', () => {
        this.scene.restart();
      });
      this.input.keyboard.on('keydown-ESC', () => {
        this.cleanup();
        this.scene.start('Menu');
      });
      // Force le focus sur le canvas (sinon les flèches peuvent partir ailleurs)
      this.game.canvas.tabIndex = 1;
      this.game.canvas.focus();
      this.input.on('pointerdown', () => this.game.canvas.focus());

      // État de la course
      this.startTime = null;
      this.elapsed = 0;
      this.flipBonus = 0;
      this.finished = false;
      this.crashed = false;
      this.contactCount = 0;
      this.lastAngle = 0;
      this.cumulativeRotation = 0;
      this.flipMessages = [];
      this.countdownStart = this.time.now;

      // === REPLAY : enregistrement de la run en cours (multi P2P uniquement) ===
      this.recordingFrames = [];           // [{t, x, y, a, wba, wfa}]
      this.lastRecordTime = 0;
      this.RECORD_INTERVAL_MS = 50;        // 20 fps suffisent pour un replay fluide

      // === MODE CHALLENGE (solo + multi P2P + serveur public + serveur privé) ===
      this.challengeMode = this.mode === 'solo' || this.mode === 'multi-host' || this.mode === 'multi-join' || this.mode === 'server' || this.mode === 'private-server';
      this.CHALLENGE_DURATION = this.durationPerMap;

      // Mode serveur public : durée vient du serveur
      if (this.mode === 'server' && this.serverState) {
        this.CHALLENGE_DURATION = this.serverState.mapDuration / 1000;
      }
      // Mode private-server : durée vient du config BO du host
      if (this.mode === 'private-server' && this.privateState) {
        this.CHALLENGE_DURATION = this.privateState.mapDuration / 1000;
      }
      this.challengeEnded = false;

      // En multi P2P : convertir le timestamp Date.now() partagé en this.time.now local
      if (this.challengeEndAt && this.challengeEndTime === null) {
        const offset = this.challengeEndAt - Date.now();
        this.challengeEndTime = this.time.now + offset;
      }

      // Mode serveur public : timer basé sur l'état envoyé par le serveur
      if (this.mode === 'server' && this.serverState && this.challengeEndTime === null) {
        const remainingMs = (this.serverState.mapStartedAt + this.serverState.mapDuration) - Date.now();
        this.challengeEndTime = this.time.now + remainingMs;
      }

      // Mode private-server : timer basé sur le mapStartedAt envoyé par le serveur
      if (this.mode === 'private-server' && this.privateState && this.challengeEndTime === null) {
        const remainingMs = (this.privateState.mapStartedAt + this.privateState.mapDuration) - Date.now();
        this.challengeEndTime = this.time.now + remainingMs;
      }

      // ====================== HUD ======================
      const scrW = this.scale.width;
      const scrH = this.scale.height;
      const hudCol = 0x0a0e1a, hudAlpha = 0.78;

      // ─── Panel JOUEUR (haut gauche) ───
      const lpW = 230, lpH = 182, lpX = 14, lpY = 14;
      const leftPanel = this.add.graphics().setScrollFactor(0);
      leftPanel.fillStyle(hudCol, hudAlpha);
      leftPanel.fillRoundedRect(lpX, lpY, lpW, lpH, 12);
      leftPanel.lineStyle(1, 0xffffff, 0.12);
      leftPanel.strokeRoundedRect(lpX, lpY, lpW, lpH, 12);

      const pseudo = Player.getName() || 'anonyme';
      this.pseudoText = this.add.text(lpX + 14, lpY + 12, '👤  ' + pseudo, {
        font: 'bold 14px sans-serif',
        color: '#ffdd44'
      }).setScrollFactor(0);

      const sepG = this.add.graphics().setScrollFactor(0);
      sepG.lineStyle(1, 0xffffff, 0.15);
      sepG.lineBetween(lpX + 14, lpY + 38, lpX + lpW - 14, lpY + 38);

      this.timerText = this.add.text(lpX + 14, lpY + 46, '0.00', {
        font: 'bold 40px monospace',
        color: '#ffffff'
      }).setScrollFactor(0);

      this.bonusText = this.add.text(lpX + lpW - 14, lpY + 60, '', {
        font: 'bold 13px monospace',
        color: '#ffdd44'
      }).setOrigin(1, 0).setScrollFactor(0);

      this.speedText = this.add.text(lpX + 14, lpY + 100, '🏍  0 km/h', {
        font: 'bold 13px monospace',
        color: '#aaffaa'
      }).setScrollFactor(0);

      const bestVal = Player.getBest(this.levelIndex);
      const bestStr = bestVal !== null
        ? '★  meilleur : ' + bestVal.toFixed(2) + 's'
        : '★  pas de record';
      this.bestText = this.add.text(lpX + 14, lpY + 124, bestStr, {
        font: 'bold 12px monospace',
        color: '#ffaa66'
      }).setScrollFactor(0);

      // Indicateur boost (1x par essai)
      this.boostText = this.add.text(lpX + 14, lpY + 152, '🚀  boost  [ESPACE]', {
        font: 'bold 12px monospace',
        color: '#66ddff'
      }).setScrollFactor(0);

      // ─── Panel CHALLENGE (haut centre) ───
      if (this.challengeMode) {
        const cpW = 280, cpH = 158, cpX = (scrW - cpW) / 2, cpY = 14;
        const centerPanel = this.add.graphics().setScrollFactor(0);
        centerPanel.fillStyle(hudCol, hudAlpha);
        centerPanel.fillRoundedRect(cpX, cpY, cpW, cpH, 12);
        centerPanel.lineStyle(2, 0xffaa44, 0.45);
        centerPanel.strokeRoundedRect(cpX, cpY, cpW, cpH, 12);

        const durLabel = this.durationPerMap === 60 ? '1 MIN' : (this.durationPerMap === 180 ? '3 MIN' : '5 MIN');
        const mapPos = this.mapSequence.length > 1
          ? `MAP ${this.currentMapIdx + 1}/${this.mapSequence.length} · ${durLabel}`
          : `CHALLENGE ${durLabel}`;
        this.add.text(scrW / 2, cpY + 12, '⏰  ' + mapPos + '  ⏰', {
          font: 'bold 11px sans-serif',
          color: '#ffaa44'
        }).setOrigin(0.5, 0).setScrollFactor(0);

        const initMin = Math.floor(this.durationPerMap / 60);
        const initSec = this.durationPerMap % 60;
        const initTimer = `${initMin}:${initSec.toString().padStart(2, '0')}`;
        this.challengeTimerText = this.add.text(scrW / 2, cpY + 30, initTimer, {
          font: 'bold 48px monospace',
          color: '#ffdd44'
        }).setOrigin(0.5, 0).setScrollFactor(0);

        // Petit séparateur
        const cSep = this.add.graphics().setScrollFactor(0);
        cSep.lineStyle(1, 0xffaa44, 0.25);
        cSep.lineBetween(cpX + 30, cpY + 92, cpX + cpW - 30, cpY + 92);

        this.runCountText = this.add.text(scrW / 2, cpY + 100, 'Run #' + this.runCount, {
          font: 'bold 11px monospace',
          color: '#ff8866'
        }).setOrigin(0.5, 0).setScrollFactor(0);

        const sessStr = this.sessionBestTime !== null
          ? 'session : ' + this.sessionBestTime.toFixed(2) + 's'
          : 'session : —';
        this.sessionBestText = this.add.text(scrW / 2, cpY + 118, sessStr, {
          font: 'bold 12px monospace',
          color: '#aaffaa'
        }).setOrigin(0.5, 0).setScrollFactor(0);

        if (this.mode === 'solo') {
          this.globalBestText = this.add.text(scrW / 2, cpY + 138, '', {
            font: 'bold 11px monospace',
            color: '#ffdd44'
          }).setOrigin(0.5, 0).setScrollFactor(0);
          if (!this.cachedTop) {
            Leaderboard.top(this.levelIndex, 1).then(top => {
              this.cachedTop = top || [];
              this.updateGlobalBestUI();
            });
          } else {
            this.updateGlobalBestUI();
          }
        } else {
          this.opponentBestText = this.add.text(scrW / 2, cpY + 138, '', {
            font: 'bold 11px monospace',
            color: '#66ccff'
          }).setOrigin(0.5, 0).setScrollFactor(0);
          this.updateOpponentBestUI();
        }
      }

      // ─── Panel NIVEAU (haut droit) ───
      const rpW = 230, rpH = 64, rpX = scrW - rpW - 14, rpY = 14;
      const rightPanel = this.add.graphics().setScrollFactor(0);
      rightPanel.fillStyle(hudCol, hudAlpha);
      rightPanel.fillRoundedRect(rpX, rpY, rpW, rpH, 12);
      rightPanel.lineStyle(1, 0xffffff, 0.12);
      rightPanel.strokeRoundedRect(rpX, rpY, rpW, rpH, 12);

      this.levelText = this.add.text(rpX + rpW - 14, rpY + 12, level.name, {
        font: 'bold 14px sans-serif',
        color: '#ffffff'
      }).setOrigin(1, 0).setScrollFactor(0);

      const modeLabel = this.mode === 'solo'
        ? 'SOLO'
        : (this.mode === 'multi-host' ? 'MULTI · HOST' : 'MULTI · GUEST');
      const modeCol = this.mode === 'solo' ? '#aaffaa' : '#66ccff';
      this.modeText = this.add.text(rpX + rpW - 14, rpY + 36, modeLabel, {
        font: 'bold 11px sans-serif',
        color: modeCol
      }).setOrigin(1, 0).setScrollFactor(0);

      // ─── Help discret en bas ───
      this.helpText = this.add.text(scrW / 2, scrH - 18,
        '←→  pilote     ↑↓  penche     ESPACE  boost     R  recommencer     ÉCHAP  menu', {
        font: 'bold 11px sans-serif',
        color: '#dddddd',
        backgroundColor: '#000a',
        padding: { x: 14, y: 6 }
      }).setOrigin(0.5).setScrollFactor(0);

      // ─── Countdown gros au milieu ───
      this.countdownText = this.add.text(scrW / 2, scrH / 2, '3', {
        font: 'bold 160px sans-serif',
        color: '#ffdd44',
        stroke: '#000', strokeThickness: 10
      }).setOrigin(0.5).setScrollFactor(0);

      // Réception data peer (P2P 1v1)
      if (this.conn) {
        this.peerListener = (data) => this.handlePeerData(data);
        this.conn.on('data', this.peerListener);
      }

      // Réception events serveur (mode salon public ou privé)
      if (this.mode === 'server' || this.mode === 'private-server') {
        const isPrivate = this.mode === 'private-server';
        this.serverHandlers = {
          pos: (msg) => {
            let g = this.ghosts.get(msg.id);
            if (!g) {
              g = { x: 0, y: 0, a: 0, wba: 0, wfa: 0, pseudo: '?', sessionBest: null, finished: false, crashed: false };
              this.ghosts.set(msg.id, g);
            }
            g.x = msg.x; g.y = msg.y; g.a = msg.a; g.wba = msg.wba; g.wfa = msg.wfa;
            g.crashed = msg.crashed; g.finished = msg.finished;
            if (msg.sessionBest !== undefined && msg.sessionBest !== null) {
              g.sessionBest = msg.sessionBest;
            }
          },
          playerJoined: (msg) => {
            this.ghosts.set(msg.id, {
              x: 100, y: 340, a: 0, wba: 0, wfa: 0,
              pseudo: msg.pseudo, sessionBest: null, finished: false, crashed: false
            });
            this.showFloatingText(msg.pseudo + ' rejoint le salon', '#66ccff');
          },
          lobbyPlayerJoined: (msg) => {
            this.ghosts.set(msg.id, {
              x: 100, y: 340, a: 0, wba: 0, wfa: 0,
              pseudo: msg.pseudo, sessionBest: null, finished: false, crashed: false
            });
            this.showFloatingText(msg.pseudo + ' rejoint le salon', '#66ccff');
          },
          playerLeft: (msg) => {
            const g = this.ghosts.get(msg.id);
            if (g) {
              this.showFloatingText(g.pseudo + ' quitte le salon', '#ff8866');
              if (g._label) { try { g._label.destroy(); } catch (e) {} }
              this.ghosts.delete(msg.id);
            }
          },
          finished: (msg) => {
            this.showFloatingText(msg.pseudo + ' : ' + msg.time.toFixed(2) + 's', '#aaffaa');
          },
          pseudo: (msg) => {
            const g = this.ghosts.get(msg.id);
            if (g) g.pseudo = msg.pseudo;
          },
          mapEnd: (msg) => {
            if (isPrivate) return;
            this.serverMapEnd(msg);
          },
          nextMapChosen: (msg) => {
            if (isPrivate) return;
            this.handleNextMapChosen(msg);
          },
          mapStart: (msg) => {
            if (isPrivate) return;
            this.scene.restart({
              level: msg.currentMapIdx,
              mode: 'server',
              currentMapIdx: msg.currentMapIdx,
              mapStartedAt: msg.mapStartedAt,
              mapDuration: msg.mapDuration,
              inTransition: false,
              transitionEndsAt: null,
              existingPlayers: Array.from(this.ghosts.values()).map(g => ({
                id: 'unknown', pseudo: g.pseudo, sessionBest: null
              }))
            });
          },
          // === Events spécifiques au salon privé ===
          privateMapEnd: (msg) => {
            if (!isPrivate) return;
            // Fin de la map : envoie son meilleur replay puis affiche le scoreboard
            if (this.bestRunReplay) {
              ServerConn.send({ type: 'replayShare', replay: this.bestRunReplay });
            }
            this.privateMapEndOverlay(msg);
          },
          privateMapStart: (msg) => {
            if (!isPrivate) return;
            // Nouvelle map → on relance GameScene avec la nouvelle map
            this.scene.restart({
              level: msg.currentMapIdx,
              mode: 'private-server',
              mapSequence: this.mapSequence,
              durationPerMap: this.durationPerMap,
              currentMapIdx: msg.seqIdx,
              privateMapIdx: msg.currentMapIdx,
              privateMapStartedAt: msg.mapStartedAt,
              privateMapDuration: msg.mapDuration,
              existingPlayers: Array.from(this.ghosts.entries()).map(([id, g]) => ({
                id, pseudo: g.pseudo, sessionBest: null
              })),
              results: this.results
            });
          },
          privateBOEnd: (msg) => {
            if (!isPrivate) return;
            // Fin du BO complet : on affiche le récap final + propage les data du lobby
            this.scene.pause();
            this.scene.launch('PrivateBOEnd', {
              bestPerMap: msg.bestPerMap,
              myId: ServerConn.myId,
              myPseudo: Player.getName() || '?',
              players: msg.players || Array.from(this.ghosts.entries()).map(([id, g]) => ({ id, pseudo: g.pseudo })),
              // Lobby data pour le bouton "Retour au lobby"
              roomCode: msg.roomCode,
              hostId: msg.hostId,
              mapSequence: msg.mapSequence,
              durationPerMap: msg.durationPerMap
            });
          },
          replayBroadcast: (msg) => {
            if (!isPrivate) return;
            // Stocke le replay reçu d'un autre joueur (utilisé pour scoreboard map)
            if (!this._replays) this._replays = new Map();
            this._replays.set(msg.playerId, { replay: msg.replay, pseudo: msg.pseudo });
          },
          close: () => {
            this.showFloatingText('Connexion serveur perdue', '#ff4444');
            this.time.delayedCall(2000, () => {
              ServerConn.disconnect();
              this.scene.start('Menu');
            });
          }
        };
        for (const [evt, fn] of Object.entries(this.serverHandlers)) {
          ServerConn.on(evt, fn);
        }

        // Touche Q : quitter le salon
        this.input.keyboard.on('keydown-Q', () => {
          ServerConn.disconnect();
          this.scene.start('Menu');
        });
      }

      // Collisions
      this.matter.world.on('collisionstart', this.onCollisionStart, this);
      this.matter.world.on('collisionend', this.onCollisionEnd, this);

      // Audio
      if (window.audio) {
        window.audio.resume();
        window.audio.startEngine();
      }

      // Cleanup à la sortie de la scène
      this.events.on('shutdown', () => {
        if (window.audio) window.audio.stopEngine();
        this.cleanup(false);
        // Cleanup listeners serveur
        if (this.serverHandlers) {
          for (const [evt, fn] of Object.entries(this.serverHandlers)) {
            ServerConn.off(evt, fn);
          }
          this.serverHandlers = null;
        }
        // Cleanup countdown interval (mode private-server)
        if (this.privateCountdownInterval) {
          clearInterval(this.privateCountdownInterval);
          this.privateCountdownInterval = null;
        }
      });
    }

    cleanup(closeConn = true) {
      if (this.conn && this.peerListener) {
        try { this.conn.off('data', this.peerListener); } catch (e) {}
      }
      if (closeConn && this.peer) {
        try { this.peer.destroy(); } catch (e) {}
      }
    }

    drawBackground() {

      g1.closePath();
